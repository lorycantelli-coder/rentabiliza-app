workflows:
  - name: create-brand-documentation
    description: "Create complete brand documentation in YAML"
    phases:
      - research: "Analyze existing brand materials"
      - strategy: "Define brand identity using combined frameworks"
      - design: "Create visual and verbal identity systems"
      - documentation: "Generate structured YAML files"
      - validation: "Quality check against all frameworks"

  - name: validate-brand-identity
    description: "Validate existing brand against world-class standards"
    phases:
      - audit: "Assess current brand state"
      - gap_analysis: "Identify weaknesses using all frameworks"
      - recommendations: "Suggest improvements"
      - implementation: "Guide fixes"

tasks:
  - create-brand-core.md
  - create-brand-voice.md
  - create-positioning-strategy.md
  - validate-brand-identity.md
  - design-visual-system.md
  - measure-brand-equity.md
  - build-distinctive-assets.md
  - create-brand-architecture.md

handoffs:
  brand-chief:
    delegates_to:
      - david-aaker: "When need brand identity planning"
      - jean-noel-kapferer: "When need holistic identity prism"
      - kevin-keller: "When need brand equity measurement"
      - alina-wheeler: "When need visual design process"
      - erich-joachimsthaler: "When need organizational transformation"
      - jenni-romaniuk: "When need asset measurement"
      - ries-trout: "When need positioning strategy"
      - leslie-chernatony: "When need complete evaluation"

quality_gates:
  - SC_AGT_001: "All agents pass smoke tests"
  - BRAND_COHERENCE: "Identity consistent across all frameworks"
  - MEASUREMENT_READY: "Can be measured using Keller & Romaniuk frameworks"
  - IMPLEMENTATION_FEASIBLE: "Wheeler process confirms deliverability"

project_application:
  target: "Rentabiliza Brand Book"
  goal: |
    Create complete YAML documentation structure for Rentabiliza brand:
    - brand/identity/ (core, voice, positioning, archetypes)
    - brand/foundation/ (colors, typography, spacing, logo)
    - brand/evidence/ (metrics, testimonials, competitive analysis)
    - brand/narrative/ (customer journey, messaging, content guidelines)
    - brand/system/ (components, patterns, templates)
