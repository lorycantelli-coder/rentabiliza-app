        - Organizational transformation
        - Brand architecture
        - Brand relationship spectrum
        - Strategic leadership

    - id: jenni-romaniuk
      name: Jenni Romaniuk
      role: Distinctive Assets Researcher
      tier: 2
      framework: Distinctive Brand Assets
      mind_dna: jenni-romaniuk-mind-dna.yaml
