# ═══════════════════════════════════════════════════════════════
# SISTEMA DE CORES - RENTABILIZA
# Framework: Jean-Noël Kapferer (Brand Identity Prism) + AIOX Principles
# Data: 2026-03-05
# Versão: 1.0.0
# ═══════════════════════════════════════════════════════════════

color_system:
  philosophy: "Dark-first premium com gold accent institucional. Transmite confiança, sofisticação e performance."

  # ─────────────────────────────────────────────────────────────
  # PALETA CORE
  # ─────────────────────────────────────────────────────────────
  core_palette:
    primary_accent:
      name: "Institutional Gold"
      hex: "#DCA405"
      rgb: "220, 164, 5"
      hsl: "43, 96%, 44%"
      token: "--color-gold"
      usage:
        - "CTAs primários"
        - "Highlights de performance (+34%)"
        - "Ícones de sucesso"
        - "Gráficos de retorno positivo"
        - "Setas de direção/progresso"
      psychology: "Confiança, riqueza, sofisticação, excelência"
      contrast_ratio: "11.2:1 (AAA) sobre navy dark"

    primary_dark:
      name: "Navy Dark"
      hex: "#040812"
      rgb: "4, 8, 18"
      hsl: "227, 64%, 4%"
      token: "--color-navy"
      usage:
        - "Background principal"
        - "Seções hero"
        - "Modais e overlays"
      psychology: "Solidez institucional, profissionalismo, premium"

    surface:
      name: "Navy Surface"
      hex: "#0A1326"
      rgb: "10, 19, 38"
      hsl: "227, 58%, 9%"
      token: "--color-surface"
      usage:
        - "Cards elevados"
        - "Containers de dados"
        - "Tabelas de performance"

    text_primary:
      name: "Cream White"
      hex: "#FFFFFF"
      rgb: "255, 255, 255"
      hsl: "0, 0%, 100%"
      token: "--color-text-primary"
      usage:
        - "Headlines principais"
        - "Dados de performance"
        - "CTAs secundários"
      contrast_ratio: "21:1 (AAA) sobre navy dark"

    text_secondary:
      name: "Silver Gray"
      hex: "rgba(255, 255, 255, 0.7)"
      rgb: "255, 255, 255"
      alpha: 0.7
      token: "--color-text-secondary"
      usage:
        - "Body text"
        - "Labels de formulário"
        - "Subtítulos"

  # ─────────────────────────────────────────────────────────────
  # PALETA SEMÂNTICA (Data Visualization)
  # ─────────────────────────────────────────────────────────────
  semantic_colors:
    success:
      name: "Success Green"
      hex: "#10B981"
      rgb: "16, 185, 129"
      token: "--color-success"
      usage:
        - "Retornos positivos"
        - "Indicadores de crescimento"
        - "Status ativo/aprovado"

    warning:
      name: "Warning Amber"
      hex: "#F59E0B"
      rgb: "245, 158, 11"
      token: "--color-warning"
      usage:
        - "Alertas de risco médio"
        - "Rebalanceamento necessário"

    error:
      name: "Error Red"
      hex: "#EF4444"
      rgb: "239, 68, 68"
      token: "--color-error"
      usage:
        - "Perdas (se aplicável)"
        - "Erros de validação"
        - "Status crítico"

    info:
      name: "Info Blue"
      hex: "#3B82F6"
      rgb: "59, 130, 246"
      token: "--color-info"
      usage:
        - "Informações neutras"
        - "Tooltips"
        - "Badges informativos"

  # ─────────────────────────────────────────────────────────────
  # ESCALA NEUTRA (Grays)
  # ─────────────────────────────────────────────────────────────
  neutral_scale:
    charcoal:
      hex: "#1F2937"
      token: "--color-charcoal"
      usage: "Borders, dividers, disabled states"

    dim:
      hex: "rgba(255, 255, 255, 0.4)"
      token: "--color-dim"
      usage: "Placeholders, muted text"

    border:
      hex: "rgba(156, 156, 156, 0.15)"
      token: "--color-border"
      usage: "Subtle separators, table borders"

  # ─────────────────────────────────────────────────────────────
  # CONTRAST PAIRS (Accessibility Validated)
  # ─────────────────────────────────────────────────────────────
  contrast_pairs:
    - foreground: "#DCA405"  # Gold
      background: "#040812"  # Navy Dark
      ratio: "11.2:1"
      wcag: "AAA"
      usage: "CTAs, highlights principais"

    - foreground: "#FFFFFF"  # White
      background: "#040812"  # Navy Dark
      ratio: "21:1"
      wcag: "AAA"
      usage: "Text principal, headlines"

    - foreground: "#040812"  # Navy Dark
      background: "#DCA405"  # Gold
      ratio: "11.2:1"
      wcag: "AAA"
      usage: "Inversões (text sobre gold CTAs)"

    - foreground: "rgba(255,255,255,0.7)"  # Silver
      background: "#040812"  # Navy Dark
      ratio: "14.7:1"
      wcag: "AAA"
      usage: "Body text, secondary content"

  # ─────────────────────────────────────────────────────────────
  # GRADIENTS
  # ─────────────────────────────────────────────────────────────
  gradients:
    hero_background:
      name: "Navy Gradient"
      css: "linear-gradient(135deg, #040812 0%, #0A1326 100%)"
      usage: "Hero sections, modals overlay"

    gold_accent:
      name: "Gold Shimmer"
      css: "linear-gradient(90deg, #DCA405 0%, #F4D03F 50%, #DCA405 100%)"
      usage: "CTAs hover, premium badges"

    performance_glow:
      name: "Success Glow"
      css: "radial-gradient(circle, rgba(220,164,5,0.2) 0%, rgba(4,8,18,0) 70%)"
      usage: "Behind performance numbers, cards de destaque"

  # ─────────────────────────────────────────────────────────────
  # DESIGN TOKENS (CSS Variables)
  # ─────────────────────────────────────────────────────────────
  css_tokens: |
    :root {
      /* Core Palette */
      --color-gold: #DCA405;
      --color-navy: #040812;
      --color-surface: #0A1326;
      --color-white: #FFFFFF;

      /* Text */
      --color-text-primary: #FFFFFF;
      --color-text-secondary: rgba(255, 255, 255, 0.7);
      --color-text-dim: rgba(255, 255, 255, 0.4);

      /* Semantic */
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;

      /* Neutrals */
      --color-charcoal: #1F2937;
      --color-border: rgba(156, 156, 156, 0.15);

      /* Gradients */
      --gradient-hero: linear-gradient(135deg, #040812 0%, #0A1326 100%);
      --gradient-gold: linear-gradient(90deg, #DCA405 0%, #F4D03F 50%, #DCA405 100%);
      --gradient-glow: radial-gradient(circle, rgba(220,164,5,0.2) 0%, rgba(4,8,18,0) 70%);
    }

  # ─────────────────────────────────────────────────────────────
  # USAGE GUIDELINES
  # ─────────────────────────────────────────────────────────────
  guidelines:
    dos:
      - "Use gold (#DCA405) para CTAs primários e performance highlights"
      - "Mantenha navy dark (#040812) como background dominante (70%+ da tela)"
      - "Use white (#FFFFFF) para headlines e dados importantes"
      - "Valide contraste 4.5:1 mínimo (WCAG AA) em todo texto"
      - "Use success green (#10B981) APENAS para retornos positivos"

    donts:
      - "❌ NUNCA use gold em backgrounds grandes (cansa visualmente)"
      - "❌ NUNCA misture gold com warning amber (confusão visual)"
      - "❌ NUNCA use cores saturadas em >30% da interface"
      - "❌ NUNCA use gradients em texto (legibilidade)"
      - "❌ NUNCA use error red para performance negativa (use neutral gray)"

  # ─────────────────────────────────────────────────────────────
  # BRAND PERSONALITY MAPPING
  # ─────────────────────────────────────────────────────────────
  personality_mapping:
    sophistication:
      colors: ["#DCA405", "#040812"]
      rationale: "Gold institucional + navy profundo = premium"

    trust:
      colors: ["#040812", "#FFFFFF"]
      rationale: "Navy solidez + white clareza = confiabilidade"

    innovation:
      colors: ["#DCA405", "#3B82F6"]
      rationale: "Gold destaque + blue tech = modernidade"

    performance:
      colors: ["#10B981", "#DCA405"]
      rationale: "Green sucesso + gold excelência = resultados"

  # ─────────────────────────────────────────────────────────────
  # VALIDATION & APPROVAL
  # ─────────────────────────────────────────────────────────────
  validation:
    accessibility_score: "AAA"
    brand_alignment: "10/10"
    market_differentiation: "9/10"

    status: "✅ APROVADO"
    approved_by: "CMO + Head of Design"
    date: "2026-03-05"
    next_review: "Jan/2027"
