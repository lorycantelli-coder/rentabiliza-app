# ═══════════════════════════════════════════════════════════════
# SISTEMA DE TIPOGRAFIA - RENTABILIZA
# Framework: Wally Olins (Corporate Identity) + AIOX Principles
# Data: 2026-03-05
# Versão: 1.0.0
# ═══════════════════════════════════════════════════════════════

typography_system:
  philosophy: "Dual-family system: Serif elegante para headlines (confiança institucional) + Sans-serif limpa para dados (clareza técnica) + Mono para números (precisão)."

  # ─────────────────────────────────────────────────────────────
  # FAMÍLIAS TIPOGRÁFICAS
  # ─────────────────────────────────────────────────────────────
  font_families:
    display:
      name: "Playfair Display"
      category: "Serif"
      weights: [400, 600, 700, 900]
      source: "Google Fonts"
      fallback: "Georgia, serif"
      usage:
        - "Headlines principais (H1, H2)"
        - "Taglines e manifestos"
        - "Títulos de seção premium"
      personality: "Elegante, institucional, confiança, sofisticação"
      why: "Transmite heritage financeiro + modernidade equilibrada"

    body:
      name: "Inter"
      category: "Sans-serif"
      weights: [300, 400, 500, 600, 700]
      source: "Google Fonts"
      fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      usage:
        - "Body text (parágrafos, descrições)"
        - "UI elements (botões, forms, labels)"
        - "Subtítulos (H3-H6)"
      personality: "Limpa, moderna, legível, acessível"
      why: "Legibilidade superior em telas + versatilidade de pesos"

    data:
      name: "Roboto Mono"
      category: "Monospace"
      weights: [400, 500, 700]
      source: "Google Fonts"
      fallback: "'Courier New', monospace"
      usage:
        - "Números de performance (34%, R$890M)"
        - "Dados financeiros (tabelas, dashboards)"
        - "Código e IDs (API keys, transaction IDs)"
      personality: "Precisa, técnica, confiável, sistemática"
      why: "Alinhamento perfeito de dígitos + feel institucional"

  # ─────────────────────────────────────────────────────────────
  # ESCALA TIPOGRÁFICA (Modular Scale 1.250 - Major Third)
  # ─────────────────────────────────────────────────────────────
  type_scale:
    display_xl:
      size: "4rem"        # 64px
      line_height: "1.1"
      weight: 700
      family: "Playfair Display"
      letter_spacing: "-0.02em"
      usage: "Hero headlines principais"
      example: "34% Acima do Mercado"

    display_lg:
      size: "3.2rem"      # 51.2px
      line_height: "1.2"
      weight: 700
      family: "Playfair Display"
      letter_spacing: "-0.01em"
      usage: "Page titles, section heroes"

    h1:
      size: "2.5rem"      # 40px
      line_height: "1.2"
      weight: 600
      family: "Playfair Display"
      usage: "Main headings"

    h2:
      size: "2rem"        # 32px
      line_height: "1.3"
      weight: 600
      family: "Inter"
      usage: "Section headings"

    h3:
      size: "1.5rem"      # 24px
      line_height: "1.4"
      weight: 600
      family: "Inter"
      usage: "Subsection headings"

    h4:
      size: "1.25rem"     # 20px
      line_height: "1.4"
      weight: 600
      family: "Inter"
      usage: "Card titles"

    body:
      size: "1rem"        # 16px
      line_height: "1.6"
      weight: 400
      family: "Inter"
      usage: "Parágrafos, body text"

    body_small:
      size: "0.875rem"    # 14px
      line_height: "1.5"
      weight: 400
      family: "Inter"
      usage: "Captions, secondary text"

    label:
      size: "0.75rem"     # 12px
      line_height: "1.4"
      weight: 500
      family: "Inter"
      letter_spacing: "0.05em"
      text_transform: "uppercase"
      usage: "Form labels, tags, badges"

    data_large:
      size: "3rem"        # 48px
      line_height: "1.1"
      weight: 700
      family: "Roboto Mono"
      usage: "Performance numbers (hero)"
      example: "+34%"

    data_medium:
      size: "1.5rem"      # 24px
      line_height: "1.2"
      weight: 500
      family: "Roboto Mono"
      usage: "Dashboard metrics, tables"

    data_small:
      size: "0.875rem"    # 14px
      line_height: "1.4"
      weight: 400
      family: "Roboto Mono"
      usage: "Small data points, codes"

  # ─────────────────────────────────────────────────────────────
  # CSS TOKENS
  # ─────────────────────────────────────────────────────────────
  css_tokens: |
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap');

    :root {
      /* Font Families */
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-data: 'Roboto Mono', 'Courier New', monospace;

      /* Type Scale */
      --text-display-xl: 4rem;      /* 64px */
      --text-display-lg: 3.2rem;    /* 51px */
      --text-h1: 2.5rem;            /* 40px */
      --text-h2: 2rem;              /* 32px */
      --text-h3: 1.5rem;            /* 24px */
      --text-h4: 1.25rem;           /* 20px */
      --text-body: 1rem;            /* 16px */
      --text-small: 0.875rem;       /* 14px */
      --text-label: 0.75rem;        /* 12px */

      /* Line Heights */
      --leading-tight: 1.1;
      --leading-snug: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.6;

      /* Letter Spacing */
      --tracking-tight: -0.02em;
      --tracking-normal: 0;
      --tracking-wide: 0.05em;
    }

  # ─────────────────────────────────────────────────────────────
  # HIERARQUIA VISUAL
  # ─────────────────────────────────────────────────────────────
  visual_hierarchy:
    level_1_hero:
      elements: ["Hero headline", "Main tagline"]
      font: "Playfair Display 700"
      size: "4rem"
      color: "#FFFFFF"
      usage: "Máximo 1 por página"

    level_2_primary:
      elements: ["Page title", "Section hero"]
      font: "Playfair Display 600"
      size: "2.5rem"
      color: "#FFFFFF"

    level_3_secondary:
      elements: ["Section headings", "Card titles"]
      font: "Inter 600"
      size: "1.5-2rem"
      color: "#FFFFFF"

    level_4_body:
      elements: ["Paragraphs", "Descriptions"]
      font: "Inter 400"
      size: "1rem"
      color: "rgba(255,255,255,0.7)"

    level_5_data:
      elements: ["Performance numbers", "Metrics"]
      font: "Roboto Mono 700"
      size: "1.5-3rem"
      color: "#DCA405"

  # ─────────────────────────────────────────────────────────────
  # USAGE EXAMPLES
  # ─────────────────────────────────────────────────────────────
  usage_examples:
    hero_section:
      html: |
        <h1 class="text-display-xl font-display text-white">
          34% Acima do Mercado
        </h1>
        <p class="text-h3 font-body text-white/70">
          IA Preditiva Auditada. Transparência Radical.
        </p>
        <span class="text-data-large font-data text-gold">
          +34%
        </span>

    performance_card:
      html: |
        <h3 class="text-h4 font-body text-white">
          Performance Histórica
        </h3>
        <p class="text-data-medium font-data text-gold">
          R$ 890M
        </p>
        <span class="text-small font-body text-white/70">
          Sob gestão (Dez/2025)
        </span>

  # ─────────────────────────────────────────────────────────────
  # GUIDELINES
  # ─────────────────────────────────────────────────────────────
  guidelines:
    dos:
      - "✅ Use Playfair Display APENAS para headlines principais (H1, H2)"
      - "✅ Use Roboto Mono para TODOS os números financeiros"
      - "✅ Mantenha line-height 1.6 mínimo para body text (legibilidade)"
      - "✅ Use letter-spacing negativo (-0.02em) em headlines grandes"
      - "✅ Combine max 2 font families por página"

    donts:
      - "❌ NUNCA use Playfair Display em parágrafos longos (cansativo)"
      - "❌ NUNCA misture serif + sans-serif em mesmo nível hierárquico"
      - "❌ NUNCA use Roboto Mono para texto corrido (ilegível)"
      - "❌ NUNCA use mais de 3 tamanhos de fonte por seção"
      - "❌ NUNCA use all-caps em parágrafos (acessibilidade)"

  # ─────────────────────────────────────────────────────────────
  # RESPONSIVE ADJUSTMENTS
  # ─────────────────────────────────────────────────────────────
  responsive:
    mobile_320_768:
      - element: "display-xl"
        adjustment: "3rem (75% do desktop)"
      - element: "h1"
        adjustment: "2rem (80% do desktop)"
      - element: "body"
        adjustment: "0.875rem (14px min para mobile)"

    tablet_768_1024:
      - element: "display-xl"
        adjustment: "3.5rem (87.5% do desktop)"
      - element: "No other changes"
        adjustment: "Mantém escala desktop"

  # ─────────────────────────────────────────────────────────────
  # VALIDATION
  # ─────────────────────────────────────────────────────────────
  validation:
    legibility_score: "AAA"
    hierarchy_clarity: "10/10"
    brand_alignment: "10/10"

    status: "✅ APROVADO"
    approved_by: "CMO + Head of Design"
    date: "2026-03-05"
    next_review: "Jan/2027"
