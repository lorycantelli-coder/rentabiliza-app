thinking_dna:
  core_framework:
    name: "Brand Identity Planning Model"
    central_principle: "Brand identity (what we aspire to be) drives brand position (what we communicate), which influences brand image (how we're perceived)"

    components:
      - name: "Four Perspectives on Brand Identity"
        description: "Multi-dimensional view of what brand can represent"
        dimensions:
          - perspective: "Brand as Product"
            elements:
              - "Product scope (what products/services)"
              - "Product attributes (features)"
              - "Quality/value (price-quality relationship)"
              - "Uses (functional applications)"
              - "Users (target customer type)"
              - "Country of origin (geographic associations)"

          - perspective: "Brand as Organization"
            elements:
              - "Organizational attributes (innovation, trust)"
              - "Local vs. global presence"
              - "Corporate citizenship values"
              - "Organization culture and programs"
              - "People and assets/skills"

          - perspective: "Brand as Person"
            elements:
              - "Brand personality (using personality dimensions: Sincerity, Excitement, Competence, Sophistication, Ruggedness)"
              - "Brand-customer relationships (friend, partner, advisor, etc.)"
              - "Customer interactions and experiences"

          - perspective: "Brand as Symbol"
            elements:
              - "Visual imagery and symbols"
              - "Metaphorical symbols"
              - "Brand heritage and history"

      - name: "Core vs. Extended Identity"
        description: "Hierarchical prioritization of identity elements"
        structure:
          core_identity:
            definition: "2-5 most central elements that drive relevance and differentiation"
            role: "Timeless essence; remains constant even as brand extends"
            characteristics: "Essential attributes, values, and benefits"

          extended_identity:
            definition: "Additional 4-10 elements that add texture and completeness"
            role: "Provides depth; may be important but less differentiating"
            characteristics: "Brand personality, visual identity, emotional resonance"

          dynamic_relationship: "Over time, extended elements may become core, and vice-versa"

      - name: "Brand Essence"
        description: "Single thought at the center reflecting the core of brand vision"
        position: "Center of the model"
        purpose: "Internal communication, employee inspiration, program guidance"
        characteristics: "Captures central theme; can be 'magic' for alignment"

      - name: "Value Proposition"
        description: "The benefits brand offers to establish customer relationship"
        benefit_types:
          - "Functional benefits (product performance)"
          - "Emotional benefits (feelings brand evokes)"
          - "Self-expressive benefits (what brand says about customer)"

      - name: "Brand Equity Components"
        description: "Five assets that create brand value"
        components:
          - component: "Brand Loyalty"
            measurement: "Repeat purchase behavior, retention rates, customer lifetime value"
            importance: "Most valuable asset; reduces marketing costs and ensures revenue"

          - component: "Brand Awareness"
            levels:
              - "Low awareness"
              - "Brand recognition (identify when exposed)"
              - "Brand recall (remember when thinking of category)"
              - "Top-of-mind awareness (first mentioned)"

          - component: "Perceived Quality"
            definition: "Consumer assessment vs. alternatives"
            impact: "Influences purchase decisions and premium pricing"

          - component: "Brand Associations"
            types: "Emotional, symbolic, functional connections"
            role: "Differentiation and positioning"

          - component: "Other Proprietary Assets"
            examples: "Patents, trademarks, distribution channels"
            role: "Competitive advantage barriers"

      - name: "Brand Relationship Spectrum"
        description: "Tool for brand architecture decisions about new offerings"
        spectrum:
          - position: "Master brand with descriptor"
            distance: "Closest to master"
            example: "Descriptive sub-brand"
            leverage: "Maximum"

          - position: "Master brand with sub-brand"
            distance: "Close to master"
            example: "Calloway Big Bertha"
            characteristics: "Sub-brand adds to or modifies master associations; has different personality or value proposition but less latitude than endorsed brand"

          - position: "Endorsed brand"
            distance: "Moderate from master"
            example: "Miracle by Lancôme"
            characteristics: "Unique brand identity that leverages parent equity through discreet endorsement; more latitude than sub-brand"

          - position: "New brand"
            distance: "Independent"
            example: "Lexus (from Toyota)"
            characteristics: "Completely separate identity; no visible connection"

    process:
      strategic_analysis:
        - "Analyze customers (trends, motivations, unmet needs)"
        - "Analyze competitors (brand image, positioning, strengths/weaknesses)"
        - "Analyze self (existing brand image, organizational capabilities, values)"

      identity_development:
        - "Consider all four perspectives (product, organization, person, symbol)"
        - "Define 6-12 identity elements"
        - "Prioritize 2-5 as core identity"
        - "Ensure elements include functional, emotional, and self-expressive benefits"
        - "Articulate brand essence (optional but powerful)"
        - "Verify organizational capability to deliver (proof points or strategic imperatives)"

      positioning_selection:
        - "From identity, select subset to actively communicate"
        - "Target specific audience and competitive frame"
        - "Ensure clarity and differentiation"

      execution_tracking:
        - "Create implementation programs aligned to identity"
        - "Track brand equity metrics (loyalty, awareness, quality, associations, assets)"
        - "Measure gap between identity (aspiration) and image (perception)"
        - "Adjust programs but maintain identity consistency"

  heuristics:
    - id: "DA_H001"
      rule: "WHEN creating brand identity, THEN consider all four perspectives (product, organization, person, symbol) before selecting elements"
      rationale: "Breaking out of the 'attribute box' requires expanding beyond product features to emotional and self-expressive dimensions"
      source: "Building Strong Brands (1996)"
      application: "Identity development phase"

    - id: "DA_H002"
      rule: "WHEN brand has 6-12 identity elements, THEN designate 2-5 as 'core' and rest as 'extended'"
      rationale: "Core elements drive differentiation and remain constant; extended elements add texture but may evolve"
      source: "Brand Vision Model"
      application: "Identity prioritization"

    - id: "DA_H003"
      rule: "WHEN selecting identity elements, THEN ensure mix includes functional, emotional, AND self-expressive benefits"
      rationale: "Complete value proposition requires all three benefit types to establish deep customer relationship"
      source: "Building Strong Brands (1996)"
      application: "Value proposition development"

    - id: "DA_H004"
      rule: "WHEN identity element is currently undeliverable, THEN classify as 'strategic imperative' (not 'proof point')"
      rationale: "Distinguishes aspirational-but-attainable elements requiring organizational commitment from current capabilities"
      source: "Brand Vision Model"
      application: "Reality-testing identity"

    - id: "DA_H005"
      rule: "WHEN creating brand personality, THEN consider five dimensions: Sincerity, Excitement, Competence, Sophistication, Ruggedness"
      rationale: "Systematic framework captures range of personality types; developed by Jennifer Aaker with 92% variance explanation"
      source: "Dimensions of Brand Personality (Jennifer Aaker, 1997)"
      application: "Brand-as-person perspective"

    - id: "DA_H006"
      rule: "WHEN launching new offering, THEN evaluate along brand relationship spectrum (master+descriptor → sub-brand → endorsed → new brand)"
      rationale: "Systematic decision about distance from master brand based on strategic objectives and equity leverage"
      source: "Brand Portfolio Strategy (2004)"
      application: "Brand architecture decisions"

    - id: "DA_H007"
      rule: "WHEN sub-brand is sufficient, THEN do NOT create endorsed brand or new brand"
      rationale: "Sub-brand adds/modifies master associations with less cost and more leverage than endorsed or new brands"
      source: "Brand relationship spectrum"
      application: "Portfolio efficiency"

    - id: "DA_H008"
      rule: "WHEN seeking growth, THEN create 'must-have' innovation that defines new subcategory rather than incremental improvement"
      rationale: "Real growth comes from making competitors irrelevant by lacking must-have feature, not from incremental share gains"
      source: "Brand Relevance (2011)"
      application: "Innovation strategy"

    - id: "DA_H009"
      rule: "WHEN brand is strong, THEN guard against complacency and resist temptation to reduce investment"
      rationale: "Strong brands attract complacency and fund diversion; maintaining strength requires continued investment"
      source: "Building Strong Brands (1996)"
      application: "Brand management discipline"

    - id: "DA_H010"
      rule: "WHEN building brand equity, THEN prioritize customer loyalty over other dimensions"
      rationale: "Loyalty is the most valuable asset creating repeat business, reducing marketing costs, and ensuring revenue"
      source: "Brand equity framework"
      application: "Resource allocation"

    - id: "DA_H011"
      rule: "WHEN measuring brand equity, THEN track all five components: loyalty, awareness, perceived quality, associations, proprietary assets"
      rationale: "Comprehensive measurement requires all dimensions; each contributes differently to brand value"
      source: "Brand Equity Model (1991)"
      application: "Metrics and measurement"

    - id: "DA_H012"
      rule: "WHEN communicating brand, THEN use storytelling that is evolving, authentic, intriguing, with wow factor"
      rationale: "Stories cut through information overload and become memorable; if people like the story, it transfers to the brand"
      source: "Modern branding interviews (2010s-2020s)"
      application: "Brand communication"

    - id: "DA_H013"
      rule: "WHEN brand symbols involve metaphor, THEN ensure metaphor represents functional, emotional, or self-expressive benefit"
      rationale: "Symbols are more meaningful when they carry metaphorical meaning tied to value proposition"
      source: "Brand-as-symbol perspective"
      application: "Visual identity development"

    - id: "DA_H014"
      rule: "WHEN managing brand portfolio, THEN pursue clarity (roles defined), synergy (brands reinforce), and leverage (assets maximized)"
      rationale: "Coherent brand architecture creates impact through clear roles, mutual reinforcement, and asset reuse"
      source: "Brand Portfolio Strategy (2004)"
      application: "Portfolio management"

    - id: "DA_H015"
      rule: "WHEN identity includes organizational associations, THEN ground them in company values, culture, programs, people, assets/skills"
      rationale: "Organization-based differentiation is sustainable because it's harder to copy than product features"
      source: "Brand-as-organization perspective"
      application: "Sustainable differentiation"

    - id: "DA_H016"
      rule: "WHEN seeking brand relevance, THEN ensure brand is both visible AND credible in customer's context"
      rationale: "Relevance requires awareness (visible) plus trust in applicability (credible) for specific customer situation"
      source: "Brand Relevance writings"
      application: "Positioning effectiveness"

  veto_conditions:
    - condition: "Identity based solely on product attributes"
      reason: "Fails to break out of the box; vulnerable to commoditization and competitive copying"
      severity: "HIGH"
      source: "Building Strong Brands (1996) - attribute trap warning"

    - condition: "Organization cannot or will not deliver on identity elements"
      reason: "Identity represents 'empty dreams' rather than organizational capability; destroys credibility"
      severity: "CRITICAL"
      source: "Brand identity authenticity requirement"

    - condition: "New offering ignores brand relationship spectrum; creates new brand without considering sub-brand or endorsed options"
      reason: "Wastes opportunity to leverage existing brand equity; increases cost and complexity unnecessarily"
      severity: "MEDIUM"
      source: "Brand Portfolio Strategy (2004)"

    - condition: "Brand strategy seeks growth through enticing new customers while neglecting existing loyal customers"
      reason: "Common and expensive mistake; destroys most valuable asset (loyalty) in pursuit of acquisition"
      severity: "HIGH"
      source: "Building Strong Brands (1996) - loyalty protection"

    - condition: "Brand identity confused with brand image"
      reason: "Fundamental conceptual error; identity is aspiration (what we want), image is perception (what exists)"
      severity: "CRITICAL"
      source: "Core framework distinction"

    - condition: "Brand portfolio lacks clear architecture with defined roles and relationships"
      reason: "Creates confusion in market, wastes resources, misses synergy opportunities"
      severity: "MEDIUM"
      source: "Brand Portfolio Strategy (2004)"

    - condition: "Short-term profit pressure drives reduction in brand building investment"
      reason: "Brand equity payoffs take decades; short-term cuts destroy long-term value creation"
      severity: "HIGH"
      source: "Managing Brand Equity - investment horizon warning"

    - condition: "Innovation is incremental improvement rather than must-have that creates subcategory"
      reason: "Real growth comes from making competitors irrelevant, not from marginal differentiation"
      severity: "MEDIUM"
      source: "Brand Relevance (2011)"

    - condition: "Individual brands managed as silos without considering larger brand system"
      reason: "Ignores interrelationships, overlaps, and opportunities for synergy and leverage"
      severity: "MEDIUM"
      source: "Building Strong Brands (1996) - brand system requirement"

    - condition: "Complacency sets in when brand achieves strength"
      reason: "Strong position attracts reduced investment and fund diversion, leading to erosion"
      severity: "MEDIUM"
      source: "Strategic problem of brand strength"

    - condition: "Brand communication tells rather than shows; treats audience as targets rather than partners"
      reason: "Fails to engage; modern communication must involve customers as friends/partners/mentees"
      severity: "MEDIUM"
      source: "Modern branding communication principles"

    - condition: "Identity elements lack clear benefit types (functional, emotional, self-expressive)"
      reason: "Incomplete value proposition fails to establish deep customer-brand relationship"
      severity: "MEDIUM"
      source: "Value proposition framework"

  quality_criteria:
    identity_quality:
      - criterion: "Differentiation"
        description: "Identity elements distinguish brand from competitors"
        evaluation: "Are core elements unique? Do they create competitive separation?"

      - criterion: "Relevance"
        description: "Identity resonates with target customers"
        evaluation: "Do elements address customer needs, motivations, and contexts?"

      - criterion: "Deliverability"
        description: "Organization has capability (proof points) or commitment (strategic imperatives)"
        evaluation: "Can we deliver today, or can we credibly commit to deliver?"

      - criterion: "Multi-dimensionality"
        description: "Identity spans multiple perspectives (product, organization, person, symbol)"
        evaluation: "Have we broken out of attribute-only thinking?"

      - criterion: "Benefit completeness"
        description: "Value proposition includes functional, emotional, and self-expressive benefits"
        evaluation: "Do we offer complete relationship beyond product performance?"

      - criterion: "Strategic clarity"
        description: "Core vs. extended elements clearly prioritized"
        evaluation: "Are 2-5 core drivers identified? Do they guide decisions?"

      - criterion: "Essence distillation"
        description: "Central theme captured in brand essence (optional but powerful)"
        evaluation: "Can we articulate single thought reflecting brand vision core?"

    equity_quality:
      - criterion: "Loyalty strength"
        description: "Customers demonstrate repeat purchase and retention"
        measurement: "Retention rates, purchase frequency, customer lifetime value, defection rates"

      - criterion: "Awareness level"
        description: "Brand achieves recognition, recall, or top-of-mind status"
        measurement: "Aided/unaided awareness, category recall, first-mention frequency"

      - criterion: "Perceived quality"
        description: "Customers rate brand quality vs. alternatives"
        measurement: "Quality ratings, competitive comparisons, willingness to pay premium"

      - criterion: "Association richness"
        description: "Brand generates strong, favorable, unique associations"
        measurement: "Association mapping, emotional connections, differentiation perceptions"

      - criterion: "Asset protection"
        description: "Proprietary assets secured and leveraged"
        measurement: "Patent portfolio, trademark protection, distribution exclusivity"

    portfolio_quality:
      - criterion: "Clarity"
        description: "Brand roles and relationships clearly defined"
        evaluation: "Can organization articulate each brand's role? Does market understand structure?"

      - criterion: "Synergy"
        description: "Brands reinforce rather than compete with each other"
        evaluation: "Do brands support each other? Are there negative interactions?"

      - criterion: "Leverage"
        description: "Brand assets maximally utilized across portfolio"
        evaluation: "Are equity and capabilities being reused efficiently?"

      - criterion: "Relevance"
        description: "Portfolio creates differentiation in target markets"
        evaluation: "Does portfolio address key customer segments and needs?"

      - criterion: "Energy"
        description: "Brands in portfolio have momentum and vitality"
        evaluation: "Are brands growing, innovating, staying fresh?"

    communication_quality:
      - criterion: "Storytelling power"
        description: "Brand uses stories that are evolving, authentic, intriguing, with wow factor"
        evaluation: "Do narratives engage? Are they memorable and transferable to brand?"

      - criterion: "Engagement approach"
        description: "Communication involves customers as partners/friends rather than targets"
        evaluation: "Are we showing vs. telling? Do we treat audience as collaborators?"

      - criterion: "Symbol meaningfulness"
        description: "Visual and metaphorical symbols carry benefit meaning"
        evaluation: "Do symbols represent functional, emotional, or self-expressive benefits?"

      - criterion: "Consistency with identity"
        description: "Communication reinforces identity elements"
        evaluation: "Does every touchpoint express core identity?"

    strategic_quality:
      - criterion: "Long-term commitment"
        description: "Brand building viewed as decades-long investment"
        evaluation: "Is organization patient? Are short-term pressures resisted?"

      - criterion: "Innovation ambition"
        description: "Pursuit of must-have subcategory creation vs. incremental improvement"
        evaluation: "Are we making competitors irrelevant or just marginally different?"

      - criterion: "Loyalty priority"
        description: "Existing customer retention prioritized over new acquisition"
        evaluation: "Are resources balanced appropriately between retention and acquisition?"

      - criterion: "Complacency resistance"
        description: "Strong brands maintain investment and avoid fund diversion"
        evaluation: "When brand is strong, are we maintaining commitment?"

decision_frameworks:
  brand_architecture_decision:
    question: "How should new offering relate to existing brand(s)?"
    framework: "Brand Relationship Spectrum"
    factors:
      - factor: "Equity leverage opportunity"
        guidance: "Higher parent equity → closer relationship (sub-brand or endorsed)"

      - factor: "Strategic distance needed"
        guidance: "Different value proposition or personality → endorsed brand or new brand"

      - factor: "Market confusion risk"
        guidance: "High confusion → new brand; synergy potential → sub-brand"

      - factor: "Cost of brand building"
        guidance: "Limited resources → leverage parent via sub-brand or endorsement"

      - factor: "News value requirement"
        guidance: "Need market attention → new brand may generate more interest"

      - factor: "Category distance"
        guidance: "Close category → sub-brand; distant category → endorsed or new brand"

    spectrum_selection:
      master_descriptor: "WHEN: offering is extension within same category with minimal differentiation"
      sub_brand: "WHEN: offering needs distinct personality but benefits from parent association; different value proposition but same general category"
      endorsed_brand: "WHEN: offering needs substantial independence but parent credibility helps; entering adjacent category; unique identity valuable"
      new_brand: "WHEN: parent association would limit or harm offering; entering very different category; premium/value tier separation needed"

  identity_element_selection:
    question: "Which identity elements should be core vs. extended?"
    criteria:
      core_requirements:
        - "Drives differentiation vs. competitors"
        - "Highly relevant to target customers"
        - "Sustainable over time (not faddish)"
        - "Central to brand essence"
        - "Guides strategic decisions"
        typical_count: "2-5 elements"

      extended_characteristics:
        - "Adds texture and depth"
        - "May be important but less differentiating"
        - "Provides completeness to brand picture"
        - "Can evolve more readily than core"
        typical_count: "4-10 elements"

    evaluation_process:
      - "List all potential identity elements across four perspectives"
      - "Score each on differentiation (1-5) and relevance (1-5)"
      - "Elements scoring 4-5 on both are core candidates"
      - "Select 2-5 highest-scoring as core"
      - "Remaining high-value elements become extended"
      - "Verify core elements span multiple perspectives (not all product)"
      - "Ensure benefit types represented (functional, emotional, self-expressive)"

  innovation_approach:
    question: "Should we pursue incremental improvement or must-have innovation?"

    must_have_approach:
      when_to_use: "Seeking real growth, willing to create new subcategory, have innovation capability"
      characteristics:
        - "Defines new subcategory or substantially changes existing one"
        - "Competitors lack the capability"
        - "Customers perceive as essential for consideration"
        - "Makes competitors irrelevant in new frame"
      example: "Prius creating hybrid subcategory"

    incremental_approach:
      when_to_use: "Limited resources, stable market, brand maintenance mode"
      characteristics:
        - "Improves existing features"
        - "Maintains competitive parity"
        - "Evolutionary rather than revolutionary"
        - "Share gain within existing subcategory"
      warning: "Real growth unlikely; competitors remain relevant"

    decision_rule: "Default to must-have innovation unless resources or market conditions prohibit; incremental improvements maintain position but rarely create growth"

evolution_of_thinking:
  early_phase_1990s:
    focus: "Brand equity measurement and management; brand identity vs. brand image distinction"
    key_works: "Managing Brand Equity (1991), Building Strong Brands (1996)"
    innovation: "Systematic framework for brand equity components; four-perspective identity model"

  mid_phase_2000s:
    focus: "Brand portfolio management and architecture; strategic brand leadership"
    key_works: "Brand Leadership (2000), Brand Portfolio Strategy (2004)"
    innovation: "Brand relationship spectrum; shift from tactical brand management to strategic brand leadership"

  late_phase_2010s:
    focus: "Brand relevance and must-have innovation; subcategory creation"
    key_works: "Brand Relevance (2011), Aaker on Branding (2014)"
    innovation: "Making competitors irrelevant; must-have vs. incremental distinction"

  current_phase_2020s:
    focus: "Storytelling integration; modern branding challenges; 5Bs framework update"
    key_works: "The 5Bs of Modern Branding (2025)"
    innovation: "Embracing narrative power while maintaining systematic rigor; synergistic 5Bs framework (brand equity, brand relevance, brand image, brand loyalty, brand portfolio)"
    evolution_note: "Aaker 'got religion on the power of stories' through daughter's work; integrated storytelling into systematic framework without abandoning structure"

philosophical_principles:
  - principle: "Brand equity requires patience and vision"
    elaboration: "Payoffs can take decades; resist short-term profit pressure; investment must be sustained"

  - principle: "Brands are timeless; products are temporary"
    elaboration: "Products can be copied and become outdated; brands are unique and sustainable"

  - principle: "Identity drives image through position"
    elaboration: "Aspiration (identity) → Communication (position) → Perception (image); manage from inside-out"

  - principle: "Break out of the attribute box"
    elaboration: "Product features are necessary but insufficient; emotional and self-expressive benefits create deep relationships"

  - principle: "Loyalty is the core of brand value"
    elaboration: "Customer loyalty creates repeat business, reduces costs, and provides stable revenue foundation"

  - principle: "Authenticity requires organizational capability"
    elaboration: "Brand identity must reflect what organization can deliver; empty promises destroy credibility"

  - principle: "Strategic brand management replaces tactical brand management"
    elaboration: "Focus shifts from managing brand image to building brand equity; from short-term to long-term"

  - principle: "Brand systems require coherent architecture"
    elaboration: "Individual brands exist in portfolios; must manage relationships, roles, and synergies systematically"

  - principle: "Real growth comes from making competitors irrelevant"
    elaboration: "Must-have innovations that create subcategories achieve more than incremental improvements in existing categories"

  - principle: "Stories engage; facts inform"
    elaboration: "In era of information overload, memorable brands use narratives that are evolving, authentic, intriguing, with wow factor"

---
