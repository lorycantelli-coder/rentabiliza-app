thinking_dna:
  core_framework:
    name: "Positioning Framework"
    origin: "1969 paper, 1972 Advertising Age series, 1981 book"
    tagline: "The Battle for Your Mind"

    fundamental_premise:
      - "Positioning occurs in the mind of the prospect, not in the product"
      - "The mind has limited capacity and organizes brands hierarchically"
      - "First position in mind is disproportionately powerful"
      - "Changing established perceptions is extremely difficult"
      - "Simplicity and focus win over complexity and breadth"

    components:
      mental_ladder_concept:
        description: "Consumers organize brands on mental ladders - one ladder per category, with brand names on each step"
        properties:
          - "Maximum 7 steps is considered 'many' - mind has limited capacity"
          - "Top position (step 1) has overwhelming advantage"
          - "Lower steps get progressively less mental attention"
          - "Each category has its own separate ladder"
          - "Very difficult to dislodge brands from established positions"

      positioning_strategies:
        - strategy: "Be First"
          description: "Establish first position in new category"
          advantage: "Nearly insurmountable over followers"

        - strategy: "Own a Word"
          description: "Associate brand with single attribute in mind"
          examples: "FedEx=overnight, Volvo=safety, Crest=cavities"

        - strategy: "Reposition Competition"
          description: "Change perception of competitor to create space"
          requirement: "Say something that makes prospects rethink competitor, not your product"

        - strategy: "Create New Category"
          description: "If can't be first in existing category, create new one"
          benefit: "Become first in new mental ladder"

        - strategy: "Opposite Positioning"
          description: "Position as alternative to leader (#2 strategy)"
          example: "Avis: We try harder"

        - strategy: "Find the Creneau"
          description: "Find unfilled hole in the mind and own it"
          requirement: "Must be meaningful and defensible position"

    positioning_process:
      step_1:
        action: "Analyze current position"
        question: "What position do we currently own in the prospect's mind?"

      step_2:
        action: "Define desired position"
        question: "What position do we want to own?"

      step_3:
        action: "Identify competitors"
        question: "Who must we outmaneuver to establish that position?"

      step_4:
        action: "Assess resources"
        question: "Do we have enough marketing resources to occupy and defend that position?"

      step_5:
        action: "Persist with consistency"
        question: "Are we committed to staying the course long enough to establish the position?"
        note: "Ries/Trout emphasize positioning requires long-term commitment and consistency"

  warfare_strategies:
    context: "From 'Marketing Warfare' (1986) - military principles applied to marketing"

    defensive_warfare:
      who: "Market leader only"
      principles:
        - "Only the market leader should play defense"
        - "Best defense is to attack yourself"
        - "Always block competitive moves"
      tactics:
        - "Address own weaknesses before competitors exploit them"
        - "Launch improved products that cannibalize own products"
        - "Pre-emptive innovation"

    offensive_warfare:
      who: "Strong #2 or #3 brands"
      principles:
        - "Main consideration is strength of leader's position"
        - "Find weakness in leader's strength and attack there"
        - "Launch attack on narrow front"
      tactics:
        - "Identify leader's strength and find inherent weakness in it"
        - "Focus resources on single attack point"

    flanking_warfare:
      who: "Mid-sized companies"
      principles:
        - "Good flanking move must be made into uncontested area"
        - "Tactical surprise is critical"
        - "Pursuit is as critical as attack itself"
      tactics:
        - "Introduce new product in uncontested space"
        - "Move quickly before competitors react"
        - "Exploit advantage immediately"

    guerrilla_warfare:
      who: "Small companies"
      principles:
        - "Find segment small enough to defend"
        - "No matter how successful, never act like the leader"
        - "Be prepared to retreat at moment's notice"
      tactics:
        - "Own narrow niche"
        - "Stay flexible and opportunistic"
        - "Avoid direct confrontation with larger competitors"

  laws_of_marketing:
    source: "The 22 Immutable Laws of Marketing (1993)"
    tagline: "Violate Them at Your Own Risk!"

    laws:
      - number: 1
        name: "Law of Leadership"
        statement: "It's better to be first than it is to be better"
        rationale: "First in mind is much more powerful than first in marketplace"

      - number: 2
        name: "Law of the Category"
        statement: "If you can't be first in a category, set up a new category you can be first in"
        rationale: "When can't be first, create new ladder in mind"

      - number: 3
        name: "Law of the Mind"
        statement: "It's better to be first in the mind than first in the marketplace"
        rationale: "Mental positioning trumps market timing"

      - number: 4
        name: "Law of Perception"
        statement: "Marketing is not a battle of products, it's a battle of perceptions"
        rationale: "Reality doesn't matter, only perception in the mind"

      - number: 5
        name: "Law of Focus"
        statement: "The most powerful concept in marketing is owning a word in the prospect's mind"
        rationale: "Reduction to single word makes positioning memorable and defensible"

      - number: 6
        name: "Law of Exclusivity"
        statement: "Two companies cannot own the same word in the prospect's mind"
        rationale: "Once word is owned, competitor must find different word"

      - number: 7
        name: "Law of the Ladder"
        statement: "Strategy depends on which rung you occupy on the ladder"
        rationale: "Different strategies for different positions"

      - number: 8
        name: "Law of Duality"
        statement: "In the long run, every market becomes a two-horse race"
        rationale: "Mind tends to simplify to two dominant brands"

      - number: 9
        name: "Law of the Opposite"
        statement: "If you're shooting for second place, your strategy is determined by the leader"
        rationale: "#2 should position as alternative/opposite to #1"

      - number: 10
        name: "Law of Division"
        statement: "Over time, a category will divide and become two or more categories"
        rationale: "Categories fragment; new ladders emerge"

      - number: 11
        name: "Law of Perspective"
        statement: "Marketing effects take place over an extended period of time"
        rationale: "Short-term tactics may have opposite long-term effects"

      - number: 12
        name: "Law of Line Extension"
        statement: "There's an irresistible pressure to extend the equity of the brand"
        rationale: "Line extension is a trap that leads to brand dilution"

      - number: 13
        name: "Law of Sacrifice"
        statement: "You have to give up something in order to get something"
        rationale: "Narrow focus requires sacrificing breadth"

      - number: 14
        name: "Law of Attributes"
        statement: "For every attribute, there is an opposite, effective attribute"
        rationale: "If can't own one attribute, own the opposite"

      - number: 15
        name: "Law of Candor"
        statement: "When you admit a negative, the prospect will give you a positive"
        rationale: "Honesty about weakness creates credibility for strength"

      - number: 16
        name: "Law of Singularity"
        statement: "In each situation, only one move will produce substantial results"
        rationale: "Focus on the one bold stroke that matters"

      - number: 17
        name: "Law of Unpredictability"
        statement: "Unless you write your competitor's plans, you can't predict the future"
        rationale: "Can't predict competitor moves; be flexible"

      - number: 18
        name: "Law of Success"
        statement: "Success often leads to arrogance, and arrogance to failure"
        rationale: "Success can create ego that loses touch with market"

      - number: 19
        name: "Law of Failure"
        statement: "Failure is to be expected and accepted"
        rationale: "Better to cut losses early than prop up failures"

      - number: 20
        name: "Law of Hype"
        statement: "The situation is often the opposite of the way it appears in the press"
        rationale: "When things are going well, companies don't need hype"

      - number: 21
        name: "Law of Acceleration"
        statement: "Successful programs are not built on fads, they're built on trends"
        rationale: "Fads are short-term; trends are long-term positioning"

      - number: 22
        name: "Law of Resources"
        statement: "Without adequate funding, an idea won't get off the ground"
        rationale: "Even best positioning needs resources to establish in mind"

  heuristics:
    - id: "RT_H001"
      rule: "WHEN entering new market, THEN aim to be first in a category rather than better than existing brand"
      rationale: "First in mind creates disproportionate advantage; being better is much harder battle"
      source: "Law of Leadership"

    - id: "RT_H002"
      rule: "WHEN can't be first in existing category, THEN create new category to be first in"
      rationale: "Mind organizes by categories; new category = new ladder with you on top"
      source: "Law of the Category"

    - id: "RT_H003"
      rule: "WHEN positioning brand, THEN reduce to single ownable word or attribute"
      rationale: "Overcommunicated society requires oversimplified message; single word is memorable and defensible"
      source: "Law of Focus"

    - id: "RT_H004"
      rule: "WHEN competitor owns desired attribute, THEN don't try to take it; own opposite or different attribute"
      rationale: "Cannot dislodge established perception; mind files brands by attributes, one brand per attribute"
      source: "Law of Exclusivity"

    - id: "RT_H005"
      rule: "WHEN you are #2 brand, THEN position as opposite/alternative to leader"
      rationale: "Leader defines the category; #2 succeeds by being the alternative choice"
      source: "Law of the Opposite"
      example: "Avis: We try harder (vs Hertz)"

    - id: "RT_H006"
      rule: "WHEN tempted to extend brand into new category, THEN resist - it dilutes positioning"
      rationale: "Line extension weakens core position and confuses mental filing"
      source: "Law of Line Extension"

    - id: "RT_H007"
      rule: "WHEN repositioning needed, THEN reposition the competition, not yourself"
      rationale: "Changing prospect's mind about competitor is easier than changing mind about your established position"
      source: "Positioning: The Battle for Your Mind"

    - id: "RT_H008"
      rule: "WHEN you are market leader, THEN best defense is attacking yourself with improvements"
      rationale: "Pre-empt competitors by making own products obsolete before they do"
      source: "Marketing Warfare - Defensive Strategy"

    - id: "RT_H009"
      rule: "WHEN you are small player, THEN find narrow segment you can defend; never act like leader"
      rationale: "Guerrilla warfare requires defendable niche and flexibility"
      source: "Marketing Warfare - Guerrilla Strategy"

    - id: "RT_H010"
      rule: "WHEN launching flanking attack, THEN move into uncontested area with surprise"
      rationale: "Flanking requires tactical surprise and uncontested space"
      source: "Marketing Warfare - Flanking Strategy"

    - id: "RT_H011"
      rule: "WHEN communicating in overcommunicated society, THEN use oversimplified message"
      rationale: "Less is more; simplicity cuts through clutter"
      source: "Positioning: The Battle for Your Mind"

    - id: "RT_H012"
      rule: "WHEN selecting brand name for new category, THEN choose name that can work generically"
      rationale: "Generic-able names help own the category itself"
      source: "Positioning: The Battle for Your Mind"

    - id: "RT_H013"
      rule: "WHEN brand achieves success, THEN resist temptation to broaden; narrow further"
      rationale: "Success from focus; broadening dilutes what made you successful"
      source: "Law of Sacrifice"

    - id: "RT_H014"
      rule: "WHEN have weakness, THEN acknowledge it honestly to gain credibility for strength"
      rationale: "Candor about negative creates trust for positive claim"
      source: "Law of Candor"
      example: "Avis: We're #2 (weakness) so we try harder (strength)"

    - id: "RT_H015"
      rule: "WHEN people perceive you certain way, THEN accept it - changing minds is nearly impossible"
      rationale: "Mind resists changing established perceptions; work with perception not against it"
      source: "Positioning: The Battle for Your Mind"

  veto_conditions:
    - condition: "Me-too positioning"
      description: "Attempting same position as established competitor"
      why_veto: "Cannot dislodge established mental position; requires enormous resources and usually fails"

    - condition: "Multiple message positioning"
      description: "Trying to own multiple words or attributes simultaneously"
      why_veto: "Confuses mental filing; dilutes message; violates Law of Focus"

    - condition: "Line extension beyond brand equity"
      description: "Extending brand name into unrelated categories"
      why_veto: "Dilutes core positioning; confuses prospects; weakens brand"

    - condition: "Being better without being different"
      description: "Superior product without distinct positioning"
      why_veto: "Better matters less than different; perception beats reality"

    - condition: "Positioning by committee"
      description: "Trying to appeal to everyone with broad positioning"
      why_veto: "Narrow focus wins; broader positioning is weaker positioning"

    - condition: "Complex messaging"
      description: "Complicated explanations in overcommunicated society"
      why_veto: "Oversimplified message required; complexity gets ignored"

    - condition: "Fighting established perception"
      description: "Trying to change what prospects already believe"
      why_veto: "Mind resists change; work with perception, don't fight it"

    - condition: "Imitation of leader (when not leader)"
      description: "Copying leader's strategy as follower"
      why_veto: "Reinforces leader's position; #2 must be opposite/alternative"

    - condition: "Underfunded positioning campaign"
      description: "Insufficient resources to establish mental position"
      why_veto: "Getting into mind requires sustained investment; Law of Resources"

  quality_criteria:
    positioning_quality:
      - criterion: "Simplicity"
        test: "Can position be reduced to single word or simple phrase?"

      - criterion: "Differentiation"
        test: "Is position clearly distinct from all competitors?"

      - criterion: "Credibility"
        test: "Is position believable given product reality?"

      - criterion: "Ownership"
        test: "Is this word/attribute available or already owned by competitor?"

      - criterion: "Relevance"
        test: "Does position matter to target prospects?"

      - criterion: "Consistency"
        test: "Can organization maintain this position long-term?"

      - criterion: "Defensibility"
        test: "Can position be defended against competitive attacks?"

      - criterion: "Memorability"
        test: "Will prospects remember and recall this position?"

    message_quality:
      - criterion: "Clarity"
        test: "Is message immediately understandable?"

      - criterion: "Focus"
        test: "Does message communicate single idea?"

      - criterion: "Brevity"
        test: "Is message as short as possible (less is more)?"

      - criterion: "Surprise"
        test: "Does message cut through clutter with unexpected angle?"

  decision_principles:
    - principle: "First in mind beats first in market"
      application: "Prioritize mental positioning over market timing"

    - principle: "Perception is reality"
      application: "Shape perceptions rather than just improving product"

    - principle: "Focus beats breadth"
      application: "Narrow positioning to single attribute"

    - principle: "Different beats better"
      application: "Seek differentiation over improvement"

    - principle: "Simplicity beats complexity"
      application: "Oversimplify message for overcommunicated society"

    - principle: "Category creation beats category entry"
      application: "Create new ladder rather than climb existing one"

    - principle: "Long-term consistency beats short-term tactics"
      application: "Maintain position over time; positioning is marathon not sprint"

  mental_models:
    overcommunicated_society:
      concept: "Modern society bombarded with messages"
      implication: "Prospects filter out most messages; only simple, focused, different messages get through"
      strategy: "Oversimplify; narrow focus; own single word"

    mental_filing_system:
      concept: "Mind organizes information into categories with hierarchical rankings"
      implication: "Brands filed on category ladders; limited positions available; hard to change filing"
      strategy: "Be first in category; own clear position; don't confuse the filing system"

    perception_permanence:
      concept: "First impressions stick; minds resist changing established perceptions"
      implication: "Repositioning yourself is extremely difficult; changing competitor perception is easier"
      strategy: "Get positioning right first time; reposition competition not yourself"

    category_dynamics:
      concept: "Categories evolve: divide into subcategories; consolidate to two leaders"
      implication: "Market structure changes create positioning opportunities"
      strategy: "Spot category divisions early; accept duality in mature markets"

examples:
  successful_positioning:
    - brand: "FedEx"
      word_owned: "Overnight"
      strategy: "First in overnight delivery category"

    - brand: "Volvo"
      word_owned: "Safety"
      strategy: "Owned safety before competitors could"

    - brand: "Crest"
      word_owned: "Cavities"
      strategy: "Focused on cavity prevention"

    - brand: "Avis"
      word_owned: "Try Harder"
      strategy: "Opposite positioning - honest #2, works harder"

    - brand: "7-Up"
      word_owned: "Uncola"
      strategy: "Positioned as alternative to cola category"

    - brand: "Volkswagen"
      word_owned: "Small"
      strategy: "Think small - opposite of American car positioning"

    - brand: "Michelob"
      word_owned: "Expensive"
      strategy: "Premium beer positioning"

  positioning_failures:
    - case: "Line extension dilution"
      example: "Established brands extending into unrelated categories"
      consequence: "Core brand weakened, new products fail"

    - case: "Me-too positioning"
      example: "Followers copying leader's position"
      consequence: "Reinforces leader, follower ignored"

    - case: "Multiple messages"
      example: "Brands trying to own multiple attributes"
      consequence: "Confusion, weak positioning, nothing sticks"

