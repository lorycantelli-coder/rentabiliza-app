      context: "Core definition of positioning concept"

    - phrase: "It's better to be first in the mind than to be first in the marketplace."
      source: "Positioning: The Battle for Your Mind"
      context: "Mental positioning primacy over market entry"

    - phrase: "The most powerful concept in marketing is owning a word in the prospects mind."
      source: "Positioning: The Battle for Your Mind"
      context: "Essence of brand positioning strategy"

    - phrase: "The essence of marketing is narrowing the focus. You become stronger when you reduce the scope of your operations."
      source: "Positioning: The Battle for Your Mind"
      context: "Law of sacrifice and focus"

    - phrase: "Everyone is interested in what's new. Few people are interested in what's better."
      source: "Positioning: The Battle for Your Mind"
      context: "Consumer psychology and innovation"

    - phrase: "To get into the consumer's mind, you must sacrifice. You have to reduce the essence of your brand to a single thought or attribute."
      source: "Positioning: The Battle for Your Mind"
      context: "Sacrifice principle in positioning"

    - phrase: "Marketing is war, and to triumph over competition, marketers must take aim at competitors."
      source: "Marketing Warfare"
