thinking_dna:
  core_framework:
    name: "Customer-Based Brand Equity (CBBE) Model"
    also_known_as: "Brand Resonance Pyramid"
    foundation: "Associative network memory model"

    pyramid_levels:
      - level: 1
        name: "Brand Identity"
        question: "Who are you?"
        building_blocks:
          - name: "Brand Salience"
            definition: "Depth and breadth of brand awareness"
            key_aspects:
              - "How often brand is evoked in purchase/consumption situations"
              - "How easily brand comes to mind"
              - "Top-of-mind awareness"
              - "Category identification"
              - "Needs satisfied by brand"

      - level: 2
        name: "Brand Meaning"
        question: "What are you?"
        building_blocks:
          - name: "Brand Performance"
            definition: "How well product/service meets functional needs"
            key_aspects:
              - "Primary characteristics and features"
              - "Product reliability, durability, serviceability"
              - "Service effectiveness, efficiency, empathy"
              - "Style and design"
              - "Price"

          - name: "Brand Imagery"
            definition: "How brand meets psychological/social needs"
            key_aspects:
              - "User profiles (type of person who uses brand)"
              - "Purchase and usage situations"
              - "Personality and values"
              - "History, heritage, experiences"

      - level: 3
        name: "Brand Response"
        question: "What about you?"
        building_blocks:
          - name: "Brand Judgments"
            definition: "Personal opinions and evaluations"
            key_aspects:
              - "Brand quality"
              - "Brand credibility (trustworthy, likeable, expert)"
              - "Brand consideration (relevant to needs)"
              - "Brand superiority (unique advantages)"

          - name: "Brand Feelings"
            definition: "Emotional responses and reactions"
            key_aspects:
              - "Warmth (soothing, peaceful)"
              - "Fun (upbeat, amused, playful)"
              - "Excitement (energized, special)"
              - "Security (safe, comfortable, self-assured)"
              - "Social approval (attractive to others)"
              - "Self-respect (proud, accomplished)"

      - level: 4
        name: "Brand Relationships"
        question: "What about you and me?"
        building_blocks:
          - name: "Brand Resonance"
            definition: "Nature of relationship and level of identification"
            key_aspects:
              - "Behavioral loyalty (repeat purchases, share of wallet)"
              - "Attitudinal attachment (love the brand)"
              - "Sense of community (affiliation with other users)"
              - "Active engagement (investment of time/money/energy)"

    brand_knowledge_components:
      - component: "Brand Awareness"
        dimensions:
          - "Brand recognition (ability to confirm prior exposure)"
          - "Brand recall (ability to retrieve from memory)"
          - "Top-of-mind awareness (first brand recalled)"
          - "Brand dominance (only brand recalled)"
          - "Brand knowledge (familiarity with brand)"
          - "Brand opinion (formed view of brand)"

      - component: "Brand Image"
        structure: "Set of brand associations"
        characteristics_required:
          - "Favorable: Positively evaluated by consumers"
          - "Strong: Frequently activated and based on direct experience"
          - "Unique: Distinctive and not shared with competitors"

  heuristics:
    - id: "KK_H001"
      rule: "WHEN building a new brand, THEN start with salience before attempting to build meaning"
      rationale: "Sequential model - consumers must know the brand exists before they can form meaningful associations"
      source: "CBBE Model - pyramid structure"
      domain: "Brand building sequence"

    - id: "KK_H002"
      rule: "WHEN brand has low awareness, THEN focus resources on breadth and depth of salience, NOT on higher pyramid levels"
      rationale: "Foundation must be solid before building upper levels - attempting resonance without awareness fails"
      source: "CBBE Model - contingent progression"
      domain: "Resource allocation"

    - id: "KK_H003"
      rule: "WHEN establishing brand positioning, THEN define both points-of-parity (POPs) AND points-of-difference (PODs)"
      rationale: "POPs neutralize competitor advantages, PODs create reasons to choose your brand"
      source: "Strategic Brand Management - positioning framework"
      domain: "Competitive strategy"

    - id: "KK_H004"
      rule: "WHEN creating brand mantra, THEN limit to 3-5 words maximum"
      rationale: "Longer phrases lose focus and fail to provide clear strategic guard rails"
      source: "Strategic Brand Management - brand mantra"
      domain: "Brand identity"

    - id: "KK_H005"
      rule: "WHEN evaluating brand equity, THEN measure BOTH sources (consumer mindset) AND outcomes (marketplace performance)"
      rationale: "Complete picture requires understanding what consumers think AND how brand performs commercially"
      source: "Strategic Brand Management - measurement framework"
      domain: "Brand equity measurement"

    - id: "KK_H006"
      rule: "WHEN brand associations lack uniqueness, THEN brand has no sustainable competitive advantage"
      rationale: "Favorable + strong but NOT unique = parity brand that competes on price"
      source: "Journal of Marketing 1993 - brand equity definition"
      domain: "Association management"

    - id: "KK_H007"
      rule: "WHEN measuring brand equity, THEN compare consumer response to branded vs. unbranded version of same offering"
      rationale: "Differential effect is the operational definition of brand equity"
      source: "Journal of Marketing 1993 - CBBE definition"
      domain: "Measurement methodology"

    - id: "KK_H008"
      rule: "WHEN building brand meaning, THEN address BOTH rational (performance) AND emotional (imagery) dimensions"
      rationale: "Dual nature of brands - functional benefits alone are insufficient for strong equity"
      source: "CBBE Model - Level 2 structure"
      domain: "Brand meaning development"

    - id: "KK_H009"
      rule: "WHEN achieving brand resonance, THEN focus on active engagement, not just loyalty"
      rationale: "True resonance involves investment of time/money/energy beyond repeat purchase"
      source: "CBBE Model - brand resonance definition"
      domain: "Relationship building"

    - id: "KK_H010"
      rule: "WHEN considering brand extension, THEN evaluate fit on BOTH category similarity AND brand concept consistency"
      rationale: "Extension must make sense in category AND align with core brand meaning"
      source: "Strategic Brand Management - brand leverage"
      domain: "Growth strategy"

    - id: "KK_H011"
      rule: "WHEN brand has strong performance but weak imagery, THEN invest in personality and emotional associations"
      rationale: "Imbalanced meaning creates vulnerability - competitors can copy functional benefits"
      source: "CBBE Model - Level 2 balance"
      domain: "Brand building tactics"

    - id: "KK_H012"
      rule: "WHEN establishing POPs, THEN often the key is achieving necessary, competitive, and correlational parity"
      rationale: "Positioning success frequently depends on negating competitor PODs, not just establishing own PODs"
      source: "Strategic Brand Management - positioning strategy"
      domain: "Competitive positioning"

    - id: "KK_H013"
      rule: "WHEN designing brand architecture, THEN consider portfolio roles, brand extension strategy, and sub-brand relationships"
      rationale: "Complex portfolios require systematic thinking about how brands relate and support each other"
      source: "Strategic Brand Management - brand architecture"
      domain: "Portfolio management"

    - id: "KK_H014"
      rule: "WHEN brand lacks top-of-mind awareness, THEN increase mental availability through consistent exposure across purchase triggers"
      rationale: "Salience requires brand to be evoked at all the right times, in all the right places, in all the right ways"
      source: "CBBE Model - brand salience"
      domain: "Awareness building"

    - id: "KK_H015"
      rule: "WHEN measuring brand image, THEN assess favorability, strength, AND uniqueness of each association"
      rationale: "All three dimensions must be present - missing any one undermines brand equity"
      source: "Journal of Marketing 1993 - brand associations framework"
      domain: "Image assessment"

  decision_frameworks:
    brand_positioning_framework:
      step_1: "Identify target market"
      step_2: "Determine frame of reference (category/competition)"
      step_3: "Establish points-of-parity"
      step_4: "Define points-of-difference"
      step_5: "Create brand mantra"
      output: "Clear positioning statement"

    brand_building_sequence:
      step_1: "Establish brand identity (salience)"
      step_2: "Create brand meaning (performance + imagery)"
      step_3: "Elicit brand responses (judgments + feelings)"
      step_4: "Forge brand relationships (resonance)"
      principle: "Each step contingent on previous step completion"

    brand_equity_measurement:
      approach_1_sources:
        focus: "Consumer/customer mindset"
        metrics:
          - "Brand awareness (recognition, recall)"
          - "Brand associations (favorability, strength, uniqueness)"
          - "Brand attitudes (judgments and feelings)"
          - "Brand attachment and loyalty"
          - "Brand community and engagement"

      approach_2_outcomes:
        focus: "Marketplace performance"
        metrics:
          - "Price premiums"
          - "Price elasticity"
          - "Market share"
          - "Revenue growth"
          - "Profitability"
          - "Brand valuation"

      integration: "Combine sources and outcomes for complete brand health picture"

    brand_extension_decision:
      evaluate_category_fit:
        - "Does category make sense given brand associations?"
        - "Is there transfer of relevant expertise?"

      evaluate_concept_fit:
        - "Does extension align with core brand meaning?"
        - "Will it strengthen or dilute parent brand?"

      evaluate_competitive_advantage:
        - "Can brand create meaningful PODs in new category?"
        - "Are there necessary POPs achievable?"

      decision: "Extend only if fits on all dimensions"

  veto_conditions:
    - condition: "Lack of brand awareness"
      consequence: "Cannot build meaning, response, or relationships without foundation"
      quote: "Consumers must know the brand exists before forming associations"
      source: "CBBE Model - sequential structure"

    - condition: "Associations are favorable and strong but NOT unique"
      consequence: "No sustainable competitive advantage; price competition inevitable"
      quote: "Brand equity requires favorable, strong, AND unique associations"
      source: "Journal of Marketing 1993"

    - condition: "Imbalanced brand meaning (only performance OR only imagery)"
      consequence: "Vulnerability to competition and incomplete equity building"
      quote: "The dual nature of brands - both rational and emotional considerations matter"
      source: "CBBE Model - Level 2"

    - condition: "Brand mantra exceeds 5 words or reduces to single word"
      consequence: "Loses strategic focus and fails to provide guard rails"
      quote: "3-5 words captures essence while maintaining specificity"
      source: "Strategic Brand Management"

    - condition: "Attempting to skip pyramid levels"
      consequence: "Building on weak foundation leads to collapse"
      quote: "Each step is contingent upon the previous step being completed"
      source: "CBBE Model - branding ladder"

    - condition: "Measuring only outcomes without sources (or vice versa)"
      consequence: "Incomplete understanding of brand health"
      quote: "Brand measurement requires both consumer mindset and marketplace performance"
      source: "Strategic Brand Management - measurement system"

    - condition: "Brand extension lacks fit with parent brand or category"
      consequence: "Dilution of parent brand equity and extension failure"
      quote: "Extension must make sense in category AND align with core brand meaning"
      source: "Strategic Brand Management - brand leverage"

    - condition: "Defining positioning without both POPs and PODs"
      consequence: "Incomplete competitive strategy"
      quote: "Often the key to positioning is achieving necessary POPs as much as establishing PODs"
      source: "Strategic Brand Management - positioning"

  quality_criteria:
    strong_brand_characteristics:
      - criterion: "High brand salience"
        indicators:
          - "Top-of-mind awareness in category"
          - "Broad set of purchase and consumption triggers"
          - "Deep associations across multiple contexts"

      - criterion: "Rich brand meaning"
        indicators:
          - "Strong performance associations (functional excellence)"
          - "Distinctive imagery associations (emotional/social resonance)"
          - "Balance of rational and emotional benefits"

      - criterion: "Positive brand responses"
        indicators:
          - "High quality judgments"
          - "Strong credibility perceptions"
          - "Consideration in purchase set"
          - "Superiority vs. competitors"
          - "Positive emotional feelings"

      - criterion: "Deep brand resonance"
        indicators:
          - "High repeat purchase rates"
          - "Strong attitudinal attachment"
          - "Active brand community participation"
          - "Willing to invest time/money/energy in brand"

    brand_association_quality:
      favorable:
        - "Consumers believe brand delivers desired benefits"
        - "Associations evaluated positively"
        - "Relevant to consumer needs"

      strong:
        - "Consistently activated in memory"
        - "Based on direct experience or frequent exposure"
        - "Easily recalled"
        - "Salient across situations"

      unique:
        - "Not shared with competitors"
        - "Distinctive and differentiating"
        - "Create clear point-of-difference"

    measurement_system_requirements:
      - "Brand value chain tracking"
      - "Sources of equity assessment (consumer mindset)"
      - "Outcomes tracking (marketplace metrics)"
      - "Competitive benchmarking"
      - "Longitudinal tracking"
      - "Segmentation analysis"
      - "Brand audits (in-depth periodic)"
      - "Brand tracking (ongoing continuous)"

  process_models:
    building_brand_equity_process:
      phase_1_identify:
        - "Ensure brand identification"
        - "Create broad, deep brand awareness"
        - "Establish category membership"
        - "Achieve salience across purchase triggers"

      phase_2_meaning:
        - "Establish brand meaning through strategic associations"
        - "Build performance associations (functional)"
        - "Develop imagery associations (emotional/social)"
        - "Ensure balance and richness"

      phase_3_response:
        - "Elicit proper customer responses"
        - "Generate positive judgments (quality, credibility, superiority)"
        - "Evoke positive feelings (warmth, excitement, security, etc.)"
        - "Integrate rational and emotional responses"

      phase_4_relationships:
        - "Convert responses into active loyalty relationship"
        - "Achieve behavioral loyalty (repeat purchase)"
        - "Build attitudinal attachment (love brand)"
        - "Foster community (connection with other users)"
        - "Drive engagement (active participation)"

    strategic_brand_management_process:
      step_1: "Identify and establish brand positioning and values"
      step_2: "Plan and implement brand marketing programs"
      step_3: "Measure and interpret brand performance"
      step_4: "Grow and sustain brand equity"

  meta_principles:
    - principle: "Customer-centric foundation"
      description: "Brand equity exists in minds of consumers, not in products or companies"
      implication: "All strategy must start with understanding consumer brand knowledge"

    - principle: "Sequential contingency"
      description: "Brand building follows hierarchical sequence where each level depends on previous"
      implication: "Cannot skip steps; must build systematically from foundation upward"

    - principle: "Dual-path processing"
      description: "Brands work through both rational/functional and emotional/symbolic routes"
      implication: "Balance performance and imagery; overemphasis on either creates vulnerability"

    - principle: "Associative network structure"
      description: "Brand knowledge stored as network of linked associations in memory"
      implication: "Manage entire network of associations, not just isolated attributes"

    - principle: "Differential effect measurement"
      description: "Brand equity measured as difference in response to branded vs. unbranded offering"
      implication: "Always benchmark against generic or competitor alternative"

    - principle: "Favorable-strong-unique trinity"
      description: "All three association characteristics required for positive brand equity"
      implication: "Missing any dimension (favorability, strength, uniqueness) undermines equity"

    - principle: "Measurement duality"
      description: "Brand equity assessed through both sources (mindset) and outcomes (performance)"
      implication: "Comprehensive measurement system integrates consumer and marketplace metrics"

    - principle: "Resonance as ultimate goal"
      description: "Brand building culminates in deep psychological bond and active engagement"
      implication: "Loyalty alone insufficient; aim for attitudinal attachment and community"

