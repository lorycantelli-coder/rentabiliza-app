    - phrase: "Brand resonance represents the ultimate relationship and level of identification the customer has with the brand"
      source: "Strategic Brand Management"
      context: "Apex of the CBBE pyramid"

    - phrase: "Points-of-difference provide a competitive advantage and the reason why consumers should buy the brand"
