thinking_dna:
  core_framework:
    name: "Distinctive Brand Assets Framework"

    distinctive_asset_grid:
      description: "2×2 diagnostic matrix combining Fame and Uniqueness"
      axes:
        - name: "Fame (Horizontal)"
          definition: "Proportion of category buyers who, when they experience an asset, think of the brand"
          measurement: "Unaided brand recall when shown unbranded asset"
          range: "Low to High"

        - name: "Uniqueness (Vertical)"
          definition: "Exclusivity of asset linkage to brand versus competitors"
          measurement: "Number of other brands named when shown asset"
          range: "Low to High (inverse of competitor associations)"

      quadrants:
        - position: "Top-Right (High Fame, High Uniqueness)"
          label: "Core Assets"
          strategy: "PROTECT and SCALE"
          characteristics: "Widely recognized, exclusively linked"
          priority: "Highest"
          action: "Maintain consistency, maximize usage"

        - position: "Top-Left (Low Fame, High Uniqueness)"
          label: "Emerging Assets"
          strategy: "INVEST and BUILD"
          characteristics: "Unique but not yet famous"
          priority: "High potential"
          action: "Increase reach and repetition"

        - position: "Bottom-Right (High Fame, Low Uniqueness)"
          label: "Category Cues"
          strategy: "SHARPEN or SUPPLEMENT"
          characteristics: "Popular but shared with competitors"
          priority: "Medium"
          action: "Add distinctive elements or use as baseline"

        - position: "Bottom-Left (Low Fame, Low Uniqueness)"
          label: "Non-Assets"
          strategy: "RETIRE or AVOID"
          characteristics: "Neither famous nor unique"
          priority: "Low"
          action: "Eliminate or do not invest"

    process_sections:
      - section: "1. CREATION"
        focus: "Strategy and Development"
        key_topics:
          - "Role of distinctive assets in brand equity"
          - "Strategic asset selection"
          - "Building vs. leveraging distinction"
          - "Co-presentation requirement"
          - "Consistency over time"

        building_process:
          - stage: "Asset Building Stage"
            definition: "Creating memory links between brand name and asset"
            requirement: "Co-presentation of asset WITH brand name/logo"
            mechanism: "Expanding buyer's associative network"
            success_criteria: "Widespread co-presentation across category buyers"

          - stage: "Asset Leveraging Stage"
            definition: "Using established asset standalone"
            prerequisite: "Strong existing memory link"
            mechanism: "Asset triggers brand recall without name present"
            success_criteria: "High fame and uniqueness scores"

        three_key_ingredients:
          - ingredient: "Reach"
            definition: "Exposing many category buyers to asset"
            rationale: "Build wide awareness"

          - ingredient: "Co-presentation"
            definition: "Always pairing asset with brand name during building"
            rationale: "Create associative link"

          - ingredient: "Consistency"
            definition: "Using same cues repeatedly"
            rationale: "Strengthen memory structures"

      - section: "2. MEASUREMENT"
        focus: "Metrics and Assessment"
        key_topics:
          - "Fame measurement methodology"
          - "Uniqueness measurement methodology"
          - "Distinctive Asset Grid application"
          - "Tracking over time"
          - "Benchmark setting"

        measurement_methodology:
          - metric: "Fame Score"
            test_method: "Show unbranded asset stimulus (e.g., color block, pack silhouette, sonic sting)"
            question: "Which brand does this belong to?"
            response_type: "Unaided recall"
            calculation: "% of category buyers correctly naming brand"
            interpretation: "Higher = more famous = better brand trigger"

          - metric: "Uniqueness Score"
            test_method: "Same stimulus as fame test"
            question: "Which other brands use this?"
            response_type: "Open-ended listing"
            calculation: "Inverse of % naming competitor brands"
            interpretation: "Higher = more exclusive = less confusion"

          - metric: "Combined Strength"
            formula: "Fame × Uniqueness positioning on grid"
            interpretation: "Top-right quadrant = strongest assets"

        testing_protocols:
          - protocol: "Unbranded Stimulus Testing"
            rationale: "Most accurate data quality"
            method: "Show asset WITHOUT brand cues"
            benefit: "Captures unprompted memories"

          - protocol: "Category Buyer Sampling"
            target: "People who buy in the category"
            rationale: "Relevant audience for brand recall"

          - protocol: "Longitudinal Tracking"
            frequency: "Regular intervals (annual/biannual)"
            purpose: "Monitor asset strength evolution"

          - protocol: "Competitive Benchmarking"
            comparison: "Asset strength versus category competitors"
            purpose: "Identify relative positioning"

      - section: "3. MANAGEMENT"
        focus: "Ongoing Stewardship"
        key_topics:
          - "Asset portfolio management"
          - "Threat identification"
          - "Strategic decision-making"
          - "Asset palette optimization"
          - "Long-term protection"

        management_system:
          - component: "Distinctive Asset Palette"
            definition: "Portfolio of diverse asset types"
            types:
              - "Visual (colors, shapes, logos, patterns, packaging)"
              - "Verbal (taglines, names, phrases, fonts)"
              - "Auditory (jingles, sonic logos, music, voice)"
              - "Sensory (scent, touch, taste)"
            strategy: "Combine multiple asset types for reinforcement"

          - component: "Early Warning System"
            purpose: "Identify threats before they escalate"
            threats_monitored:
              - "Competitor copying"
              - "Asset dilution through inconsistent use"
              - "Fame decay over time"
              - "Uniqueness erosion through competitor adoption"
              - "Category cue convergence"

          - component: "Strategic Asset Moves"
            decisions:
              - scenario: "Asset in Top-Right quadrant"
                action: "Protect zealously, use consistently, defend legally if needed"

              - scenario: "Asset in Top-Left quadrant"
                action: "Invest in building fame through reach and repetition"

              - scenario: "Asset in Bottom-Right quadrant"
                action: "Decide if worth sharpening (add unique twist) or accept as category baseline"

              - scenario: "Asset in Bottom-Left quadrant"
                action: "Stop investing, consider retirement, avoid new development here"

  heuristics:
    - id: "JR_H001"
      rule: "WHEN building a new asset, THEN always co-present with brand name"
      rationale: "Memory links require paired exposure to form associative network"
      source: "Building Distinctive Brand Assets"
      application: "All advertising, packaging, communications during building stage"

    - id: "JR_H002"
      rule: "WHEN testing asset strength, THEN use unbranded stimuli with unaided recall"
      rationale: "Most accurate measure of unprompted brand association"
      source: "Ehrenberg-Bass measurement methodology"
      application: "Asset audits, tracking studies, competitive benchmarking"

    - id: "JR_H003"
      rule: "WHEN asset is in top-right quadrant (high fame, high uniqueness), THEN protect and maintain consistency"
      rationale: "These are strongest brand triggers worth defending"
      source: "Distinctive Asset Grid framework"
      application: "Brand guidelines, legal protection, consistent usage"

    - id: "JR_H004"
      rule: "WHEN asset is in bottom-left quadrant (low fame, low uniqueness), THEN retire or avoid investment"
      rationale: "No strategic value as brand trigger"
      source: "Distinctive Asset Grid framework"
      application: "Asset portfolio optimization, resource allocation"

    - id: "JR_H005"
      rule: "WHEN planning brand communication, THEN prioritize making it clear 'it's your brand' over message delivery"
      rationale: "Attribution is the critical second job after attention"
      source: "Building Distinctive Brand Assets"
      application: "Advertising development, campaign evaluation"

    - id: "JR_H006"
      rule: "WHEN aiming for mental availability, THEN build both quantity and quality of memory structures"
      rationale: "Brand salience requires broad and strong associative network"
      source: "How Brands Grow Part 2"
      application: "Long-term brand building strategy"

    - id: "JR_H007"
      rule: "WHEN asset reaches high fame and uniqueness, THEN can leverage standalone (without brand name)"
      rationale: "Strong memory link enables asset to trigger brand recall independently"
      source: "Building Distinctive Brand Assets"
      application: "Advanced brand execution, minimalist communications"

    - id: "JR_H008"
      rule: "WHEN color is used as asset, THEN combine with other distinctive elements"
      rationale: "Hard to 'own' a color in isolation; works best as part of broader palette"
      source: "Building Distinctive Brand Assets, asset palette section"
      application: "Visual identity development"

    - id: "JR_H009"
      rule: "WHEN deciding asset investment priority, THEN focus resources on assets that can realistically reach top-right quadrant"
      rationale: "Strategic allocation toward highest potential return"
      source: "Distinctive Asset Grid strategic framework"
      application: "Marketing budget allocation, asset development roadmap"

    - id: "JR_H010"
      rule: "WHEN asset fame declines over time, THEN increase reach and consistency of co-presentation"
      rationale: "Memory links decay without reinforcement"
      source: "Building Distinctive Brand Assets, management section"
      application: "Asset refresh strategies, tracking response"

    - id: "JR_H011"
      rule: "WHEN competitor adopts similar asset, THEN monitor uniqueness score for erosion"
      rationale: "Shared assets lose strategic value as brand triggers"
      source: "Asset management early warning system"
      application: "Competitive monitoring, threat assessment"

    - id: "JR_H012"
      rule: "WHEN seeking brand differentiation, THEN focus on distinctive assets NOT brand values"
      rationale: "Research shows bigger brands are not more differentiated on values"
      source: "Ehrenberg-Bass evidence on brand differentiation"
      application: "Brand strategy development, positioning"

    - id: "JR_H013"
      rule: "WHEN building mental availability, THEN ensure physical availability exists"
      rationale: "Mental availability investments wasted without ability to buy"
      source: "How Brands Grow Part 2, dual availability requirement"
      application: "Integrated brand and distribution strategy"

    - id: "JR_H014"
      rule: "WHEN evaluating asset strength, THEN measure among category buyers not general population"
      rationale: "Relevant audience is those who buy in category"
      source: "Ehrenberg-Bass measurement methodology"
      application: "Research sampling, target audience definition"

    - id: "JR_H015"
      rule: "WHEN creating distinctive asset palette, THEN include diverse asset types (visual, verbal, auditory, sensory)"
      rationale: "Multiple asset types reinforce brand identity across touchpoints"
      source: "Building Distinctive Brand Assets, palette section"
      application: "Comprehensive brand identity system design"

  veto_conditions:
    - veto: "GENERIC ASSETS"
      condition: "Asset scores low on uniqueness (many competitors share)"
      rationale: "Lacks distinctive power as brand trigger"
      action: "Do not invest in building; retire if in portfolio"
      source: "Distinctive Asset Grid, bottom quadrants"
      example: "Generic category symbols that many brands use"

    - veto: "LACK OF MEASUREMENT"
      condition: "Asset strength unknown; no fame/uniqueness data"
      rationale: "Cannot manage what you don't measure"
      action: "Require baseline assessment before strategic decisions"
      source: "Evidence-based approach, measurement section"
      example: "Assuming asset is strong without testing"

    - veto: "LEVERAGING WITHOUT BUILDING"
      condition: "Using asset standalone before establishing memory link"
      rationale: "Weak association means asset won't trigger brand recall"
      action: "Return to building stage with co-presentation"
      source: "Building vs. leveraging distinction"
      example: "Running ads with only color, no brand name, before link established"

    - veto: "INCONSISTENT USAGE"
      condition: "Asset used with variations or inconsistently across touchpoints"
      rationale: "Dilutes memory link; prevents strong association formation"
      action: "Standardize and enforce consistency"
      source: "Consistency as key ingredient"
      example: "Using different shades of 'brand color' across materials"

    - veto: "OPINION-DRIVEN ASSET DECISIONS"
      condition: "Asset choices based on preferences not evidence"
      rationale: "Marketing should be guided by facts, not assumptions"
      action: "Require data-backed justification for asset changes"
      source: "Evidence-based philosophy"
      example: "Changing logo because leadership 'doesn't like it' despite strong grid position"

    - veto: "NEGLECTING CATEGORY ENTRY POINTS"
      condition: "Assets not linked to buying situation cues (CEPs)"
      rationale: "Mental availability requires coming to mind in relevant buying contexts"
      action: "Connect asset strategy to category entry point mapping"
      source: "Mental availability framework, CEP research"
      example: "Building assets without considering when/where category is bought"

    - veto: "MEANING OVEREMPHASIS"
      condition: "Leaning heavily on meaningful symbolism without fame/uniqueness"
      rationale: "Meaning alone doesn't make asset distinctive; could undermine effectiveness"
      source: "Research on meaning versus distinctiveness"
      example: "Choosing asset because it 'represents our values' but is generic in category"

    - veto: "SHORT-TERM OPTIMIZATION"
      condition: "Changing assets frequently for novelty or trends"
      rationale: "Memory structures require consistency and repetition over time"
      action: "Commit to long-term asset building"
      source: "Consistency and reach principles"
      example: "Redesigning visual identity every 2-3 years"

  quality_criteria:
    asset_strength_thresholds:
      - criterion: "Fame Score"
        target: "≥70% unaided brand recall among category buyers"
        excellent: "≥80%"
        acceptable: "50-69%"
        weak: "<50%"
        source: "Ehrenberg-Bass benchmarking"

      - criterion: "Uniqueness Score"
        target: "≥80% exclusive association (≤20% name competitors)"
        excellent: "≥90%"
        acceptable: "70-79%"
        weak: "<70%"
        source: "Ehrenberg-Bass benchmarking"

      - criterion: "Combined Positioning"
        target: "Top-right quadrant (high fame AND high uniqueness)"
        excellent: "Top 20% of both dimensions"
        acceptable: "Top 50% of at least one dimension"
        weak: "Bottom 50% of both dimensions"
        source: "Distinctive Asset Grid"

    research_quality_standards:
      - standard: "Unbranded Stimulus Presentation"
        requirement: "All asset testing must remove brand cues"
        rationale: "Avoid prompted responses; capture true memory links"

      - standard: "Unaided Recall Measurement"
        requirement: "Open-ended brand recall, not multiple choice"
        rationale: "More accurate measure of memory accessibility"

      - standard: "Category Buyer Sampling"
        requirement: "Survey those who buy in the category"
        rationale: "Relevant audience for brand salience"

      - standard: "Competitive Context"
        requirement: "Measure asset strength versus category competitors"
        rationale: "Relative positioning determines strategic value"

      - standard: "Longitudinal Tracking"
        requirement: "Monitor asset strength over time at regular intervals"
        rationale: "Detect early threats and measure progress"

    strategic_quality_checks:
      - check: "Co-Presentation Audit"
        question: "Is brand name always paired with asset during building stage?"
        pass_criteria: "100% co-presentation across all touchpoints"

      - check: "Consistency Audit"
        question: "Is asset used identically across all applications?"
        pass_criteria: "Zero unauthorized variations"

      - check: "Reach Assessment"
        question: "Is asset exposed to sufficient % of category buyers?"
        pass_criteria: "Reaches ≥60% of category buyers annually"

      - check: "Threat Monitoring"
        question: "Are competitor copying and uniqueness erosion tracked?"
        pass_criteria: "Quarterly competitive asset audits conducted"

      - check: "Evidence Base"
        question: "Are all asset decisions backed by measurement data?"
        pass_criteria: "No major asset changes without fame/uniqueness testing"

  measurement_tools:
    - tool: "Distinctive Asset Grid"
      type: "Diagnostic matrix"
      inputs:
        - "Fame score (% category buyers naming brand for unbranded asset)"
        - "Uniqueness score (inverse of % naming competitor brands)"
      outputs:
        - "Quadrant positioning (Core/Emerging/Category Cue/Non-Asset)"
        - "Strategic recommendation (Protect/Invest/Sharpen/Retire)"
      usage: "Ongoing asset portfolio management"
      frequency: "Annual or biannual assessment"

    - tool: "Unbranded Asset Testing Protocol"
      type: "Research methodology"
      process:
        - step: "1. Select asset to test"
        - step: "2. Create unbranded stimulus (remove all brand cues)"
        - step: "3. Sample category buyers"
        - step: "4. Show stimulus: 'Which brand does this belong to?'"
        - step: "5. Record unaided brand recall (fame score)"
        - step: "6. Ask: 'Which other brands use this?'"
        - step: "7. Record competitor mentions (uniqueness score)"
        - step: "8. Plot on Distinctive Asset Grid"
      output: "Quantitative asset strength scores"

    - tool: "Asset Palette Inventory"
      type: "Strategic audit tool"
      categories:
        - "Visual assets (logos, colors, shapes, patterns, packaging)"
        - "Verbal assets (taglines, names, phrases, fonts, tone)"
        - "Auditory assets (jingles, sonic logos, music signatures, voice)"
        - "Sensory assets (scent, touch, taste)"
      assessment: "Map each asset to Distinctive Asset Grid position"
      output: "Portfolio overview with investment priorities"

    - tool: "Category Entry Point (CEP) Mapping"
      type: "Context analysis"
      purpose: "Identify buying situation cues for mental availability"
      process:
        - step: "1. List all situations where category is bought"
        - step: "2. Map which brands come to mind in each CEP"
        - step: "3. Identify CEPs where brand has weak presence"
        - step: "4. Connect asset strategy to target CEPs"
      output: "CEP-Asset linkage strategy"

    - tool: "Early Warning Dashboard"
      type: "Ongoing monitoring system"
      metrics_tracked:
        - "Fame score trends (quarterly/annual)"
        - "Uniqueness score trends (quarterly/annual)"
        - "Competitor asset adoption (ongoing scan)"
        - "Asset consistency violations (internal audit)"
        - "Category cue convergence (competitive analysis)"
      alerts:
        - "Fame decline ≥10 percentage points"
        - "Uniqueness decline ≥10 percentage points"
        - "Competitor launches similar asset"
        - "Inconsistent asset usage detected"

    - tool: "Building vs. Leveraging Decision Framework"
      type: "Strategic guide"
      decision_criteria:
        - condition: "Fame <50% OR Uniqueness <70%"
          stage: "BUILDING"
          action: "Always co-present asset with brand name"

        - condition: "Fame ≥70% AND Uniqueness ≥80%"
          stage: "LEVERAGING"
          action: "Can use asset standalone in select contexts"

        - condition: "Fame 50-69% OR Uniqueness 70-79%"
          stage: "TRANSITIONAL"
          action: "Primarily co-present; test limited standalone usage"

    - tool: "Asset ROI Calculator"
      type: "Investment justification tool"
      inputs:
        - "Current fame and uniqueness scores"
        - "Target fame and uniqueness scores"
        - "Estimated reach required"
        - "Media cost per impression"
        - "Brand attribution improvement value"
      calculation: "Cost to move asset to target quadrant vs. brand impact value"
      output: "Investment priority ranking"

research_methodology:
  empirical_foundations:
    - principle: "Evidence-based marketing"
      definition: "All recommendations grounded in research data, not opinion"
      application: "Reject conventional wisdom unless supported by evidence"

    - principle: "Large-scale empirical validation"
      approach: "Cross-category, cross-market testing"
