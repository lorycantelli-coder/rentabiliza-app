thinking_dna:
  core_framework:
    name: "Five-Phase Brand Identity Design Process"
    description: "Universal methodology for creating and implementing brand identity from research through governance"

    phases:
      - phase: 1
        name: "Conducting Research"
        role: "Listen, observe, gain insights"
        purpose: "Understand organizational vision, stakeholders, market, and competition"
        activities:
          - "Clarify organizational vision, strategies, goals, and values"
          - "Research stakeholders' needs and perceptions"
          - "Conduct marketing audit"
          - "Conduct competitive audit"
          - "Conduct technology audit"
          - "Conduct legal audit"
          - "Conduct language audit"
          - "Interview key management"
          - "Evaluate existing brands and brand architecture"
          - "Create stakeholder diagram"
          - "Create touchpoint diagram"
          - "Collect information for use throughout process"
        key_tools:
          - "Brand audit"
          - "Competitive analysis"
          - "Stakeholder interviews"
          - "Touchpoint mapping"
          - "Customer journey mapping"
        mindset: "Think like a sleuth, shrink, and scientist"
        success_criteria: "Decision makers involved throughout, comprehensive understanding documented"

      - phase: 2
        name: "Clarifying Strategy"
        role: "Narrow focus, define direction"
        purpose: "Synthesize research into strategic foundation for design"
        activities:
          - "Synthesize learnings from research"
          - "Develop positioning platform"
          - "Co-create brand attributes"
          - "Write brand brief"
          - "Create naming strategy"
          - "Develop key messaging"
          - "Produce creative brief"
          - "Achieve agreement on brand essence"
          - "Define competitive advantage"
          - "Clarify target market"
          - "Articulate value proposition"
        key_tools:
          - "Brand brief"
          - "Positioning statement"
          - "Brand attributes list"
          - "Creative brief"
          - "Naming criteria"
        critical_principle: "Agree on what the brand stands for BEFORE any creative work begins"
        success_criteria: "Key decision makers aligned on brand fundamentals documented in brief"

      - phase: 3
        name: "Designing Identity"
        role: "Visualize the future"
        purpose: "Create integrated visual identity system"
        activities:
          - "Brainstorm concepts"
          - "Design logotype and signature"
          - "Develop color palette"
          - "Establish typography system"
          - "Create iconography"
          - "Define look and feel"
          - "Explore trial applications"
          - "Finalize brand architecture (visual)"
          - "Design for multiple platforms"
          - "Present strategic rationale for design"
          - "Secure stakeholder agreement"
        key_deliverables:
          - "Logo/logotype/signature"
          - "Color system"
          - "Typography system"
          - "Imagery style"
          - "Design elements and patterns"
        design_philosophy: "Create whole integrated system, not just single symbol"
        success_criteria: "Design approved by stakeholders with documented strategic rationale"

      - phase: 4
        name: "Creating Touchpoints"
        role: "Build enterprise-wide system"
        purpose: "Apply brand identity across all customer and stakeholder interactions"
        activities:
          - "Finalize identity design"
          - "Develop overall look and feel"
          - "Initiate trademark protection"
          - "Design applications in priority order"
          - "Apply brand architecture across program"
          - "Establish application rules"
          - "Extend to all touchpoints"
          - "Design for consistency and flexibility"
        touchpoint_categories:
          - "Website and digital"
          - "Correspondence (letterheads, envelopes)"
          - "Business cards"
          - "Collateral materials"
          - "Signage"
          - "Product design"
          - "Packaging"
          - "Advertising"
          - "Vehicles"
          - "Uniforms"
          - "Ephemera (promotional items)"
          - "Social media"
          - "Environments"
        balance_principle: "Achieve right balance between flexibility and consistency"
        success_criteria: "Priority touchpoints designed, system can extend to new applications"

      - phase: 5
        name: "Managing Assets"
        role: "Nurture and govern brand"
        purpose: "Launch brand and ensure consistent application over time"
        activities:
          - "Develop launch strategy"
          - "Execute internal rollout first"
          - "Execute external launch"
          - "Develop brand standards and guidelines"
          - "Create brand book"
          - "Build online branding tools/brand center"
          - "Nurture internal brand advocates"
          - "Make guidelines available to everyone who needs them"
          - "Establish brand governance process"
          - "Communicate intentionally"
        key_tools:
          - "Brand standards manual"
          - "Brand guidelines"
          - "Brand book"
          - "Brand center (digital asset management)"
          - "Launch plan"
        critical_insight: "Launch internally before externally, create champions first"
        success_criteria: "Brand successfully launched, guidelines accessible, governance in place"

    cross_phase_principles:
      - "Involve decision makers throughout all phases"
      - "Build on previous phase - each informs the next"
      - "Document everything for shared understanding"
      - "Use visual tools (diagrams, frameworks) extensively"
      - "Achieve agreement before moving forward"
      - "Stay customer-centric throughout"
      - "Balance strategic thinking with creative expression"

  brand_identity_ideals:
    - ideal: "Vision"
      description: "Effective brand identity is visionary; looks to future while respecting past"
      questions: ["Does it position the company for future growth?"]

    - ideal: "Meaning"
      description: "Brand identity must have authentic meaning and substance"
      questions: ["Does it communicate brand essence and values?", "Is meaning clear?"]

    - ideal: "Authenticity"
      description: "Brand identity must be genuine, truthful to organizational reality"
      questions: ["Does it reflect who we really are?", "Is it honest?"]

    - ideal: "Differentiation"
      description: "Brand identity must distinguish from competition"
      questions: ["How are we different?", "Where is meaningful difference possible?"]

    - ideal: "Sustainability"
      description: "Brand identity must endure and remain relevant over time"
      questions: ["Will it stand test of time?", "Can it evolve?"]

    - ideal: "Coherence"
      description: "Everything must hold together regardless of channel"
      questions: ["Does system work across all touchpoints?", "Is it unified?"]

    - ideal: "Flexibility"
      description: "System must accommodate future products, technologies, channels"
      questions: ["Can it facilitate brand extensions?", "Is infrastructure adaptable?"]

    - ideal: "Commitment"
      description: "Leadership must nurture brand over time"
      questions: ["Does management support ongoing investment?", "Is there organizational buy-in?"]

    - ideal: "Value"
      description: "Brand identity must deliver value to business and customers"
      questions: ["What value does this create?", "Does it build brand equity?"]

  heuristics:
    - id: "AW_H001"
      rule: "WHEN starting brand identity work, THEN conduct research first and achieve strategic alignment before any design begins"
      rationale: "Design without strategy leads to aesthetic-only solutions that don't solve business problems"
      source: "Designing Brand Identity - Phase 1 & 2"
      veto_trigger: "Client wants logo concepts immediately without research/strategy phase"

    - id: "AW_H002"
      rule: "WHEN presenting design, THEN talk about the meaning and strategic rationale, not the aesthetics"
      rationale: "Design decisions must be justified by strategy, not personal preference"
      source: "Designer interviews"
      application: "Don't talk about the design—talk about the meaning of what you have designed"

    - id: "AW_H003"
      rule: "WHEN evaluating brand identity, THEN assess against business goals not personal taste"
      rationale: "Effectiveness matters more than preference - 'it's not about what you like, it's about what works'"
      source: "Designer interviews"
      evaluation_shift: "From 'do I like it' to 'does it work'"

    - id: "AW_H004"
      rule: "WHEN client has not agreed on brand fundamentals, THEN hold back from designing"
      rationale: "Designers must not begin creative work until client clarity exists on brand essence, positioning, etc."
      source: "Multiple sources on strategy phase"
      tool: "Use brand brief to achieve alignment before proceeding"

    - id: "AW_H005"
      rule: "WHEN designing brand identity, THEN create integrated system not just single logo"
      rationale: "Logo alone is not brand identity - need color, typography, iconography, applications, etc."
      source: "Core framework - Phase 3 & 4"
      scope: "Logo design vs identity design distinction"

    - id: "AW_H006"
      rule: "WHEN launching brand, THEN rollout internally before externally"
      rationale: "Create internal champions first - employees must understand and embrace before customers see it"
      source: "Phase 5 - Managing Assets"
      sequence: "Internal first, then external"

    - id: "AW_H007"
      rule: "WHEN conducting research, THEN involve decision makers throughout"
      rationale: "Their involvement keeps process honest and prevents surprises later"
      source: "Phase 1 guidance"
      stakeholder_principle: "Early involvement equals early buy-in"

    - id: "AW_H008"
      rule: "WHEN creating brand architecture, THEN anticipate future products/technologies/channels"
      rationale: "System must be flexible enough to accommodate growth and change"
      source: "Brand Identity Ideals - Flexibility"
      forward_thinking: "Design infrastructure for the future, not just today"

    - id: "AW_H009"
      rule: "WHEN analyzing competition, THEN identify where meaningful difference is still possible"
      rationale: "Competitive audit reveals opportunities for differentiation"
      source: "Phase 1 - Competitive Analysis"
      insight_goal: "Spot where you can be different and better"

    - id: "AW_H010"
      rule: "WHEN designing touchpoints, THEN balance coherence with flexibility"
      rationale: "Everything must hold together while allowing adaptation to different contexts"
      source: "Phase 4, Brand Identity Ideals"
      tension_to_manage: "Consistency vs adaptability"

    - id: "AW_H011"
      rule: "WHEN creating brand standards, THEN make them accessible to everyone who needs them"
      rationale: "Guidelines only work if people can find and use them"
      source: "Phase 5 - Managing Assets"
      tool: "Brand center - centralized digital repository"

    - id: "AW_H012"
      rule: "WHEN facing brand anxiety, THEN trust the process"
      rationale: "Disciplined methodology with realistic benchmarks reduces anxiety and builds confidence"
      source: "Wheeler's rationale for creating five-phase process"
      psychology: "Process creates confidence in solution and people"

    - id: "AW_H013"
      rule: "WHEN working with clients, THEN use brand brief to ensure key decision makers agree on fundamentals"
      rationale: "Brand brief documents essence, competitive advantage, target market, value proposition"
      source: "Phase 2 - Strategy tools"
      agreement_on: ["Brand essence", "Competitive advantage", "Target market", "Value proposition"]

    - id: "AW_H014"
      rule: "WHEN mapping customer experience, THEN identify where brand delights and where it disappoints"
      rationale: "Every phase of journey is chance to deepen loyalty"
      source: "Touchpoint mapping guidance"
      opportunity_lens: "Turn disappointments into loyalty-building moments"

    - id: "AW_H015"
      rule: "WHEN building brands, THEN remember it's team effort from leadership to designers to employees"
      rationale: "Everyone plays role in shaping brand experience, not just design team"
      source: "Collaborative approach throughout book"
      stakeholders: "Leadership, designers, marketers, employees, partners"

  decision_frameworks:
    when_to_rebrand:
      appropriate_conditions:
        - "Starting new company or product"
        - "Name changes (merger, acquisition, restructure)"
        - "Revitalizing tired or outdated brand"
        - "Creating integrated system from fragmented identity"
        - "Companies merge and need unified identity"
        - "Brand no longer reflects organizational reality"

      prerequisites:
        - "Executive mandate as business imperative"
        - "Organizational readiness to invest time, capital, attention"
        - "Clearly defined goals for measurable outcomes"
        - "Willingness to document results"

      veto_conditions:
        - "No executive commitment or mandate"
        - "Organization not ready to invest resources"
        - "Goals unclear or unmeasurable"
        - "Purely aesthetic motivation without business case"
        - "Expecting identity alone to solve business problems"
        - "Leadership won't commit to nurturing brand over time"

    logo_vs_identity_design:
      logo_design_scope:
        - "Focuses on one element: pictorial/abstract symbol or wordmark"
        - "Creates single mark"

      identity_design_scope:
        - "Examines context of symbol in marketplace"
        - "Develops whole integrated system"
        - "Includes color, typography, brand architecture"
        - "Encompasses key messages, imagery, content marketing"
        - "Considers organizational goals, stakeholders"
        - "Addresses look and feel, sound, motion"
        - "Analyzes competitive landscape"

      decision_rule: "If project needs more than just a mark, it's identity design not logo design"

    research_depth:
      audit_types:
        - "Marketing audit"
        - "Competitive audit"
        - "Technology audit"
        - "Legal audit"
        - "Language audit"
        - "Brand architecture audit"

      research_methods:
        - "Stakeholder interviews"
        - "Management interviews"
        - "Customer research"
        - "Touchpoint mapping"
        - "Customer journey mapping"
        - "Competitive analysis"

      decision_rule: "Research depth should match project complexity and organizational size"
      minimum_viable: "Competitive analysis, stakeholder alignment, touchpoint audit"

  process_decision_making:
    - decision: "How much research is enough?"
      guidance: "Enough to understand organizational vision, stakeholder needs, competitive landscape, and current brand touchpoints"
      minimum: "Stakeholder interviews, competitive audit, touchpoint mapping"

    - decision: "When to move from strategy to design?"
      guidance: "When key decision makers have agreed on brand fundamentals documented in brand brief"
      checkpoint: "Brand brief signed off with essence, positioning, attributes defined"

    - decision: "How to evaluate design concepts?"
      guidance: "Against strategic criteria in creative brief, not personal aesthetic preference"
      criteria: ["Communicates brand essence", "Differentiates from competition", "Flexible enough for future", "Works across touchpoints", "Sustainable over time"]

    - decision: "Which touchpoints to design first?"
      guidance: "Priority order based on customer journey and business impact"
      typical_sequence: ["Logo/signature", "Digital (website)", "Business cards/stationery", "Key marketing materials", "Other applications"]

    - decision: "How detailed should brand standards be?"
      guidance: "Detailed enough to ensure consistency, flexible enough to allow creativity"
      must_include: ["Logo usage rules", "Color specifications", "Typography system", "Imagery guidelines", "Application examples"]

    - decision: "Internal or external launch first?"
      guidance: "Always internal first - create champions before public sees identity"
      rationale: "Employees must understand and embrace before customers encounter it"

  veto_conditions:
    process_violations:
      - condition: "Client wants to skip research and go straight to design"
        why_veto: "Design without strategic foundation produces aesthetics without meaning"
        response: "Explain five-phase process, minimum viable research required"

      - condition: "Decision makers disagree on brand fundamentals but want designs"
        why_veto: "Designing without alignment wastes time and creates conflict"
        response: "Use brand brief tool to achieve agreement before proceeding"

      - condition: "Client evaluating concepts based on 'I like it' not 'it works'"
        why_veto: "Preference-based decisions ignore strategic objectives"
        response: "Redirect conversation to meaning, strategic rationale, effectiveness"

      - condition: "Expecting logo alone to solve business problems"
        why_veto: "Logo is gateway, not the brand itself - need integrated system"
        response: "Educate on logo vs identity design, scope to full system"

      - condition: "No commitment to implementing standards after design"
        why_veto: "Inconsistent application undermines entire investment"
        response: "Include Phase 5 in scope, create brand center/guidelines"

      - condition: "Launching externally before internal stakeholders ready"
        why_veto: "Employees unprepared means poor customer experience, undermines brand"
        response: "Insist on internal rollout first, create champions"

    design_quality_issues:
      - condition: "Design doesn't differentiate from competition"
        why_veto: "Fails fundamental brand identity ideal of differentiation"
        test: "Place alongside competitors - does it stand out or blend in?"

      - condition: "System too rigid, can't accommodate future needs"
        why_veto: "Violates flexibility ideal - system must anticipate growth"
        test: "Can this work for new product lines, channels, technologies?"

      - condition: "Identity lacks coherence across applications"
        why_veto: "Fails coherence ideal - everything must hold together"
        test: "Do all applications feel like same brand?"

      - condition: "Design doesn't communicate brand essence/meaning"
        why_veto: "Missing strategic rationale - just decoration"
        test: "Can you explain the meaning behind design decisions?"

      - condition: "Identity not authentic to organizational reality"
        why_veto: "Authenticity is core ideal - must reflect who you really are"
        test: "Does this truly represent our organization or is it aspirational fiction?"

      - condition: "Won't be sustainable over time"
        why_veto: "Sustainability ideal - trendy vs enduring"
        test: "Will this look dated in 3-5 years or have staying power?"

  quality_criteria:
    excellent_brand_identity:
      - "Communicates brand essence and meaning clearly"
      - "Differentiates from competition in meaningful ways"
      - "Balances coherence (holds together) with flexibility (adapts to contexts)"
      - "Authentic to organizational reality, not aspirational fiction"
      - "Sustainable over time, not trend-dependent"
      - "Positions for future growth while respecting heritage"
      - "Based on strategic foundation, not aesthetic preference"
      - "Works as integrated system across all touchpoints"
      - "Supported by committed leadership willing to nurture it"
      - "Creates value for business and customers"

    evaluation_questions:
      strategic_alignment:
        - "Does it communicate our brand essence?"
        - "Is it aligned with our competitive advantage?"
        - "Does it speak to our target market?"
        - "Does it express our value proposition?"

      differentiation:
        - "How is this different from competition?"
        - "Where have we found meaningful difference?"
        - "Does it stand out or blend in?"

      system_thinking:
        - "Does it work as integrated system, not just logo?"
        - "Can it extend to all necessary touchpoints?"
        - "Does everything hold together?"

      future_readiness:
        - "Can it accommodate future products/services?"
        - "Will it work with new technologies/channels?"
        - "Is infrastructure flexible enough?"

      sustainability:
        - "Will it endure or look dated quickly?"
        - "Can it evolve while maintaining equity?"
        - "Does it have staying power?"

      authenticity:
        - "Does it reflect who we really are?"
        - "Is there authentic meaning behind it?"
        - "Will employees and customers recognize us?"

      implementation:
        - "Can we actually implement this consistently?"
        - "Do we have commitment to maintain standards?"
        - "Is it practical across all applications?"

  tools_and_templates:
    research_phase:
      - name: "Brand Audit"
        purpose: "Evaluate present state of brand"
        components: ["Visual audit", "Touchpoint inventory", "Current usage analysis"]

      - name: "Competitive Audit"
        purpose: "Understand how competitors leverage branding"
        approach: "Identify 3-5 leading competitors, deep dive on their branding"
        deliverable: "Analysis of what they do well, where they fall short"

      - name: "Stakeholder Diagram"
        purpose: "Map all stakeholders and their relationships"
        uses: "Understand org structure, identify interview subjects"

      - name: "Touchpoint Diagram"
        purpose: "Map all ways organization communicates"
        visual: "Brand in center, spokes showing different touchpoints"

      - name: "Customer Journey Map"
        purpose: "Identify where brand delights and disappoints"
        outcome: "Opportunities to deepen loyalty"

    strategy_phase:
      - name: "Brand Brief"
        purpose: "Document strategic foundation for brand identity"
        must_include:
          - "Brand essence"
          - "Competitive advantage"
          - "Target market"
          - "Value proposition"
        critical_use: "Ensure key decision makers agree before design begins"

      - name: "Positioning Platform"
        purpose: "Clarify brand position in market"
        components: ["Target audience", "Frame of reference", "Point of difference", "Reason to believe"]

      - name: "Brand Attributes"
        purpose: "Define personality and character of brand"
        co-creation: "Develop with stakeholders for buy-in"

      - name: "Creative Brief"
        purpose: "Translate strategy into design direction"
        bridges: "Strategy phase to design phase"

      - name: "Naming Strategy"
        purpose: "Framework for creating or evaluating names"
        criteria: ["Distinctive", "Meaningful", "Protectable", "Flexible"]

    design_phase:
      - name: "Design Exploration Process"
        stages: ["Brainstorm concepts", "Sketch ideas", "Refine directions", "Present options"]
        emphasis: "Multiple concepts with strategic rationale"

      - name: "Application Explorations"
        purpose: "Test identity across contexts"
        sample_applications: "Business card, website, signage, etc."

      - name: "Presentation Framework"
        structure: ["Strategic context", "Design rationale", "System demonstration", "Application examples"]
        key_principle: "Talk about meaning, not just aesthetics"

    implementation_phase:
      - name: "Brand Standards Manual"
        purpose: "Document rules for consistent application"
        sections: ["Logo usage", "Color specs", "Typography", "Imagery", "Spacing", "Don'ts"]

      - name: "Brand Guidelines"
        purpose: "User-friendly guide for brand application"
        difference_from_standards: "More accessible, example-driven"

      - name: "Brand Book"
        purpose: "Comprehensive brand documentation"
        audience: "All stakeholders, new team members"

      - name: "Brand Center"
        purpose: "Centralized digital repository for brand assets"
        contains: ["Logos in all formats", "Templates", "Guidelines", "Examples", "Resources"]
        benefit: "Ensures everyone has access to correct, current assets"

      - name: "Launch Plan"
        components: ["Internal rollout strategy", "External launch timeline", "Communication plan", "Training materials"]
        sequence: "Internal first, external second"

    governance_phase:
      - name: "Brand Governance Framework"
        purpose: "Ongoing management and protection of brand"
        includes: ["Approval processes", "Usage monitoring", "Update procedures"]

      - name: "Brand Champion Network"
        purpose: "Internal advocates who understand and protect brand"
        development: "Train during internal rollout"

  key_distinctions:
    - distinction: "Logo vs Brand"
      explanation: "Logo is a symbol; brand is entire perception and experience"
      wheeler_position: "A logo is not a brand - it's the gateway to the brand"

    - distinction: "Logo Design vs Identity Design"
      logo_design: "One element - pictorial/abstract symbol or wordmark"
      identity_design: "Whole integrated system with strategy, color, typography, applications, etc."

    - distinction: "Selling vs Educating"
      wrong_approach: "Selling design to clients"
      right_approach: "Educating clients on strategic rationale and meaning"

    - distinction: "What You Like vs What Works"
      wrong_criteria: "Personal aesthetic preference"
      right_criteria: "Strategic effectiveness and business alignment"

    - distinction: "Your Logo vs Their Logo"
      wrong_mindset: "Designer ownership"
      right_mindset: "Client ownership, designer stewardship"

    - distinction: "Research vs Design"
      sequence: "Research and strategic agreement BEFORE design begins"
      veto: "Never design before strategy is clear"

    - distinction: "Internal vs External Launch"
      sequence: "Always internal before external"
      rationale: "Create champions before public sees it"

    - distinction: "Consistency vs Flexibility"
      not_either_or: "Must balance both - coherence with adaptability"
      system_requirement: "Everything holds together while allowing contextual variation"

  success_factors:
    project_level:
      - "Executive mandate treating branding as business imperative"
      - "Organizational readiness to invest time, capital, attention"
      - "Clearly defined, measurable goals"
      - "Decision makers involved throughout process"
      - "Strategic foundation established before design"
      - "Integrated system created, not just logo"
      - "Standards developed and accessible"
      - "Internal launch before external"
      - "Commitment to ongoing governance"

    designer_level:
      - "Trust the process despite anxiety"
      - "Listen deeply to stakeholders"
      - "Build trust and earn seat at table"
      - "Be curious about everything"
      - "Study beyond design - psychology, business, culture"
      - "Talk about meaning, not just design"
      - "Stay customer-centric"
      - "Collaborate across disciplines"
      - "Maintain sense of humor"
      - "Keep learning continuously"

  philosophical_foundations:
    - "Branding is managing perception"
    - "Design is strategic imagination aligning business goals with creative expression"
    - "Brand identity is disciplined process, not just creative inspiration"
    - "The hardest part is decision-making process, not the design"
    - "Bring MBAs and creative professionals together to collaborate skillfully"
    - "Provide agreed-upon roadmap so teams can journey together"
    - "Make best possible decisions for right reasons"
    - "Design makes intelligence visible"
    - "Symbols are fastest communication known to humans"
    - "Everyone from leadership to employees plays role in brand experience"

  evolution_notes:
    - "First edition 2003, sixth edition 2024 - methodology has proven sustainable"
    - "Core principles (clarity, consistency, differentiation, authenticity) remain timeless"
    - "Process adapts well to new contexts (digital, social, experiential)"
    - "Book structure: Brand fundamentals → Process basics → Case studies"
    - "Over 100+ branding subjects with checklists, tools, diagrams"
    - "50+ case studies from global brands"
    - "700+ illustrations of brand touchpoints"
    - "400+ quotes from branding experts, CEOs, design leaders"
    - "Published in 11 languages"
    - "Became 'Robert's Rules of Order for brand-builders'"

