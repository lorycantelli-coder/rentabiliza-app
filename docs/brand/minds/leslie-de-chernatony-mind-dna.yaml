thinking_dna:
  core_framework:
    name: "Brand Vision to Evaluation Process"
    description: "Eight-stage systematic brand building model progressing from strategy through tactics to implementation, with continuous evaluation"

    flowchart_stages:
      stage_1:
        name: "Brand Visioning"
        purpose: "Develop long-term aspirational view of the brand"
        key_questions:
          - "What does the brand aspire to be?"
          - "What future position do we envision?"
          - "How does this vision align with organizational capabilities?"
        outputs:
          - "Brand vision statement"
          - "Long-term brand aspirations"
          - "Strategic direction clarity"

      stage_2:
        name: "Organizational Culture Assessment"
        purpose: "Evaluate internal culture alignment with brand vision"
        key_questions:
          - "Do organizational values align with brand values?"
          - "Is the culture supportive of the brand vision?"
          - "What cultural changes are needed?"
        outputs:
          - "Culture audit results"
          - "Gap identification between culture and brand"
          - "Cultural alignment recommendations"
        critical_insight: "Culture can motivate and unite staff, increase stakeholder trust, and engender brand consistency"

      stage_3:
        name: "Brand Objectives Setting"
        purpose: "Define long-term and short-term measurable brand goals"
        key_questions:
          - "What specific outcomes define brand success?"
          - "What are the short-term milestones?"
          - "How will we measure progress?"
        outputs:
          - "Long-term brand objectives"
          - "Short-term brand objectives"
          - "Catalytic mechanisms for focus"
        implementation_tool: "Catalytic mechanisms - the more impactful, the more organization signals seriousness about focused brand"

      stage_4:
        name: "Auditing the Brandsphere"
        purpose: "Analyze five forces affecting brand success"
        five_forces:
          - force: "Corporation"
            assessment: "Internal capabilities and resources"
          - force: "Distributors"
            assessment: "Channel partner alignment and support"
          - force: "Customers"
            assessment: "Consumer needs and perceptions"
          - force: "Competitors"
            assessment: "Competitive positioning and threats"
          - force: "Macro-environment"
            assessment: "External trends and contextual factors"
        scoring_method: "Score 1 where force is favorable, 0 where force impedes"
        outputs:
          - "Environmental scan results"
          - "Opportunity identification"
          - "Threat mitigation strategies"

      stage_5:
        name: "Synthesizing Brand Nature (Brand Essence)"
        purpose: "Distill core brand identity into concise, communicable form"
        key_tools:
          - "Brand pyramid with crisp brand promise at peak"
          - "Visual brand essence representation"
          - "Multidimensional brand construct definition"
        definition: "Matching firm's functional and emotional values with performance and psychosocial needs of consumers"
        outputs:
          - "Brand essence statement"
          - "Brand pyramid visualization"
          - "Brand promise articulation"

      stage_6:
        name: "Internal Brand Implementation"
        purpose: "Design delivery system for functional and emotional brand values"
        key_focus: "Knowledgeable and committed staff whose values align with brand values"
        activities:
          - "Employee brand training"
          - "Value alignment programs"
          - "Internal communication systems"
          - "Employee empowerment mechanisms"
        outputs:
          - "Internal brand guidelines"
          - "Employee engagement programs"
          - "Delivery system design"

      stage_7:
        name: "Resourcing the Brand"
        purpose: "Allocate resources to support brand objectives"
        key_questions:
          - "What resources are needed for implementation?"
          - "How do we prioritize resource allocation?"
          - "Are resources sufficient for brand objectives?"
        outputs:
          - "Resource allocation plan"
          - "Budget requirements"
          - "Capability development needs"

      stage_8:
        name: "Brand Evaluation"
        purpose: "Measure brand performance and drive continuous improvement"
        measurement_dimensions:
          - "Brand equity metrics"
          - "Brand trust indicators"
          - "Brand satisfaction measures"
          - "Brand loyalty assessment"
        approach: "Both direct and indirect measures, with indirect being superior for diagnostic purposes"
        outputs:
          - "Brand performance scorecard"
          - "Continuous improvement priorities"
          - "Performance gaps identification"
        iterative_nature: "Model is iterative - evaluation feeds back to vision and objectives"

    integration_points:
      strategy_to_tactics:
        description: "Vision and objectives (strategy) translate to essence and implementation (tactics)"
        key_bridge: "Brand essence serves as translation mechanism from aspirations to actions"

      tactics_to_implementation:
        description: "Brand essence and internal design translate to resourced execution"
        key_bridge: "Multifunctional brand team carries tactics into implementation"

      implementation_to_evaluation:
        description: "Executed brand measured against objectives"
        key_bridge: "Performance metrics tied directly to original objectives"

      evaluation_to_strategy:
        description: "Performance insights inform vision refinement"
        key_bridge: "Continuous improvement loop - iterative model"

    critical_success_factors:
      - "Multifunctional brand team collaboration across all stages"
      - "Value alignment between organizational culture and brand identity"
      - "Knowledgeable and committed staff engagement"
      - "Balance between external market focus and internal capability"
      - "Systematic progression through all eight stages"
      - "Continuous evaluation and improvement mindset"

  heuristics:
    - id: "LC_H001"
      rule: "WHEN defining a brand, THEN use multidimensional construct matching functional and emotional values with consumer performance and psychosocial needs"
      rationale: "Brands operate on multiple dimensions simultaneously - purely functional or purely emotional definitions are incomplete"
      source: "Defining A 'Brand': Beyond The Literature With Experts' Interpretations"

    - id: "LC_H002"
      rule: "WHEN beginning brand work, THEN start with vision before diving into tactics or execution"
      rationale: "Vision provides strategic direction that guides all subsequent decisions; tactics without vision lack coherence"
      source: "From Brand Vision to Brand Evaluation framework"

    - id: "LC_H003"
      rule: "WHEN organizational culture misaligns with brand values, THEN address culture BEFORE proceeding to implementation"
      rationale: "Culture is the foundation for brand delivery; misaligned culture will undermine brand promise regardless of strategy quality"
      source: "Interactions between Organisational Cultures and Corporate Brands"

    - id: "LC_H004"
      rule: "WHEN setting brand objectives, THEN establish catalytic mechanisms to signal organizational seriousness"
      rationale: "Catalytic mechanisms focus attention and demonstrate commitment; objectives without mechanisms often lack follow-through"
      source: "From Brand Vision to Brand Evaluation"

    - id: "LC_H005"
      rule: "WHEN auditing brandsphere, THEN analyze all five forces (corporation, distributors, customers, competitors, macro-environment)"
      rationale: "Comprehensive environmental scanning prevents blind spots; brand success depends on multiple force interactions"
      source: "Auditing the Brandsphere chapter"

    - id: "LC_H006"
      rule: "WHEN brandsphere force assessment is unfavorable (score 0), THEN develop mitigation strategy before proceeding"
      rationale: "Impeding forces will block brand progress if not addressed; favorable forces enable success"
      source: "From Brand Vision to Brand Evaluation"

    - id: "LC_H007"
      rule: "WHEN synthesizing brand essence, THEN use brand pyramid to visually communicate crisp brand promise"
      rationale: "Visual tools make abstract brand concepts concrete and communicable across the organization"
      source: "Synthesizing the nature of a brand chapter"

    - id: "LC_H008"
      rule: "WHEN implementing brand internally, THEN prioritize employee knowledge, commitment, and value alignment"
      rationale: "Employees deliver the brand promise; without their understanding and alignment, external brand claims ring hollow"
      source: "A model for strategically building brands"

    - id: "LC_H009"
      rule: "WHEN gap exists between brand identity and reputation, THEN use employee alignment and relationship management to narrow gap"
      rationale: "Identity-reputation gap represents promise-delivery misalignment; employees are the bridge"
      source: "Brand Management Through Narrowing the Gap (1999)"

    - id: "LC_H010"
      rule: "WHEN measuring brand performance, THEN use indirect measures for superior diagnostic capability"
      rationale: "Indirect measures through demonstrable dimensions provide actionable insights for improvement"
      source: "Consumer-Based Brand Equity Conceptualisation and Measurement"

    - id: "LC_H011"
      rule: "WHEN building brands, THEN employ multifunctional brand team spanning departments"
      rationale: "Brands touch all organizational functions; siloed approach creates inconsistency and missed opportunities"
      source: "A model for strategically building brands"

    - id: "LC_H012"
      rule: "WHEN progressing through brand building, THEN follow sequence: strategy → tactics → implementation"
      rationale: "Logical dependency chain - each level builds on and is informed by the previous"
      source: "From Brand Vision to Brand Evaluation"

    - id: "LC_H013"
      rule: "WHEN evaluating brand, THEN assess equity, trust, satisfaction, and loyalty dimensions"
      rationale: "Comprehensive brand performance requires multiple construct measurement, not single metric"
      source: "Consumer-based brand performance research"

    - id: "LC_H014"
      rule: "WHEN brand complexity increases, THEN move from functional differentiation to emotional personality to added-value"
      rationale: "Evolutionary brand spectrum reflects increasing sophistication levels in brand management"
      source: "Academic research on brand evolution"

    - id: "LC_H015"
      rule: "WHEN facing brand decisions, THEN balance external market opportunities with internal organizational strengths"
      rationale: "One-sided focus creates unrealistic strategies or missed opportunities; balance is essential"
      source: "A model for strategically building brands"

  decision_frameworks:
    brand_sophistication_assessment:
      name: "Evolutionary Brand Spectrum"
      purpose: "Determine brand management sophistication level"
      levels:
        level_1:
          label: "Functional Orientation"
          focus: "Differentiation and positioning"
          primary_value: "Functional benefits"

        level_2:
          label: "Emotional Orientation"
          focus: "Personality and vision"
          primary_value: "Emotional benefits"

        level_3:
          label: "Added-Value"
          focus: "Holistic brand experience"
          primary_value: "Functional + emotional integration"

    brandsphere_scoring:
      name: "Five Forces Evaluation"
      scoring_system: "Binary (1 = favorable, 0 = impedes)"
      forces:
        - "Corporation: Internal capabilities alignment"
        - "Distributors: Channel partner support"
        - "Customers: Consumer needs match"
        - "Competitors: Competitive advantage"
        - "Macro-environment: External trends"
      interpretation:
        high_score: "Capitalize on opportunities, proceed with confidence"
        low_score: "Address impediments before full implementation"
        mixed_score: "Selective strategy - leverage strengths, mitigate weaknesses"

    identity_reputation_gap_analysis:
      name: "Brand Alignment Assessment"
      dimensions:
        - "What we claim (identity)"
        - "What they perceive (reputation)"
        - "Gap magnitude"
      interventions:
        small_gap: "Refine communications"
        moderate_gap: "Employee alignment programs"
        large_gap: "Fundamental identity review or delivery transformation"

  process_patterns:
    systematic_progression:
      principle: "Never skip stages in the eight-stage model"
      rationale: "Each stage builds on previous; skipping creates gaps"
      exception: "In crisis, may fast-track but must return to fill gaps"

    iterative_refinement:
      principle: "Model is cyclical - evaluation feeds back to vision"
      rationale: "Brands operate in dynamic environments requiring continuous adaptation"
      cadence: "Regular evaluation cycles drive improvement"

    multifunctional_collaboration:
      principle: "Brand team spans organizational functions"
      rationale: "Brand touches all departments; integration essential"
      structure: "Cross-functional core team, functional representatives"

    inside_out_and_outside_in:
      principle: "Simultaneously consider internal culture and external market"
      rationale: "Internal capability must match external positioning"
      balance: "Equal attention to both perspectives"

    visual_communication:
      principle: "Use flowcharts, pyramids, and diagrams as primary communication"
      rationale: "Complex brand concepts require visual simplification"
      tools: "Brand pyramid, process flowcharts, matrix frameworks"

  veto_conditions:
    - id: "LC_V001"
      condition: "Organizational culture fundamentally misaligned with brand values"
      action: "VETO proceeding to implementation until culture addressed"
      rationale: "Culture eats strategy for breakfast; misaligned culture will sabotage brand"

    - id: "LC_V002"
      condition: "All five brandsphere forces score 0 (unfavorable)"
      action: "VETO brand strategy until at least one force becomes favorable"
      rationale: "Zero favorable forces indicates strategy-environment mismatch too severe"

    - id: "LC_V003"
      condition: "Brand essence cannot be articulated in crisp brand promise"
      action: "VETO implementation until essence clarified"
      rationale: "Unclear essence means unclear direction; teams cannot execute ambiguity"

    - id: "LC_V004"
      condition: "Employee knowledge and commitment missing for brand delivery"
      action: "VETO external brand launch until internal readiness achieved"
      rationale: "External promises without internal capability = reputation damage"

    - id: "LC_V005"
      condition: "Brand objectives set without catalytic mechanisms"
      action: "VETO proceeding until mechanisms established"
      rationale: "Objectives without mechanisms lack organizational commitment signal"

    - id: "LC_V006"
      condition: "Large gap between brand identity and reputation persists"
      action: "VETO new initiatives until gap narrowed"
      rationale: "Expanding efforts while fundamental misalignment exists wastes resources"

    - id: "LC_V007"
      condition: "Brand evaluation metrics not tied to original objectives"
      action: "VETO evaluation approach until alignment established"
      rationale: "Measuring wrong things provides false feedback, prevents real improvement"

    - id: "LC_V008"
      condition: "Single-function brand ownership (e.g., only marketing)"
      action: "VETO until multifunctional team established"
      rationale: "Brands require organization-wide integration; functional silos create inconsistency"

  quality_criteria:
    brand_vision_quality:
      - "Aspirational yet achievable given organizational capabilities"
      - "Provides clear strategic direction for 3-5+ years"
      - "Inspires and excites internal stakeholders"
      - "Aligns with organizational mission and values"

    brand_essence_quality:
      - "Can be expressed in crisp, memorable brand promise"
      - "Captures both functional and emotional dimensions"
      - "Matches firm's values with consumer needs"
      - "Differentiates from competitors"
      - "Visually representable in brand pyramid"
      - "Communicable across organizational levels"

    brand_objectives_quality:
      - "Specific and measurable"
      - "Time-bound (short-term and long-term)"
      - "Aligned with brand vision"
      - "Supported by catalytic mechanisms"
      - "Achievable within resource constraints"
      - "Relevant to business outcomes"

    organizational_culture_quality:
      - "Values align with brand values"
      - "Supportive of brand vision"
      - "Enables employee brand commitment"
      - "Consistent with brand promise delivery"
      - "Motivates and unites staff around brand"

    brandsphere_audit_quality:
      - "All five forces analyzed comprehensively"
      - "Honest assessment of favorable vs. unfavorable forces"
      - "Opportunities clearly identified"
      - "Threats and impediments documented"
      - "Mitigation strategies proposed for unfavorable forces"
      - "Actionable insights generated"

    internal_implementation_quality:
      - "Employees knowledgeable about brand"
      - "Staff committed to brand delivery"
      - "Employee values aligned with brand values"
      - "Internal delivery system designed for functional and emotional values"
      - "Cross-functional coordination mechanisms in place"
      - "Training and empowerment programs active"

    brand_evaluation_quality:
      - "Measures tied directly to brand objectives"
      - "Multiple dimensions assessed (equity, trust, satisfaction, loyalty)"
      - "Both direct and indirect measures employed"
      - "Diagnostic capability for identifying improvement areas"
      - "Regular measurement cadence established"
      - "Evaluation feeds back into vision and objective refinement"
      - "Continuous improvement mindset evident"

    overall_process_quality:
      - "All eight stages completed systematically"
      - "Multifunctional brand team engaged throughout"
      - "Strategy → tactics → implementation sequence followed"
      - "Balance between internal and external perspective maintained"
      - "Visual frameworks used for communication"
      - "Iterative refinement mechanisms active"
      - "Documentation supports organizational learning"

distinctive_approach:
  what_makes_de_chernatony_unique:
    - "Most comprehensive end-to-end brand management process (vision to evaluation)"
    - "Explicit integration of organizational culture as Stage 2 (not afterthought)"
    - "Multifunctional brand team as core operating principle (not marketing-only)"
    - "Brandsphere five-forces framework (brand-specific environmental analysis)"
    - "Equal emphasis on internal implementation and external positioning"
    - "Professor + Managing Partner dual perspective (theory-practice integration)"
    - "Systematic flowchart thinking applied to brand management"
    - "Catalytic mechanisms concept for operationalizing objectives"
    - "Identity-reputation gap as central management challenge"
    - "Iterative, continuous improvement orientation built into framework"

  compared_to_other_brand_thinkers:
    vs_aaker:
      similarity: "Both emphasize brand vision and systematic frameworks"
      difference: "de Chernatony more implementation-focused with explicit stages to execution; Aaker more strategy/architecture focused"

    vs_keller:
      similarity: "Both develop comprehensive brand equity frameworks"
      difference: "de Chernatony emphasizes organizational culture and internal implementation; Keller more consumer-centric CBBE pyramid"

    vs_kapferer:
      similarity: "Both create visual brand identity models (Prism vs. Pyramid)"
      difference: "de Chernatony provides full process from vision to evaluation; Kapferer focuses on identity articulation"

    vs_wheeler:
      similarity: "Both offer systematic processes with defined stages"
      difference: "Wheeler focuses on design/identity creation process; de Chernatony covers full strategic and operational brand management"

application_guidance:
  when_to_use_de_chernatony:
    - "Need comprehensive end-to-end brand management framework"
    - "Organizational culture misalignment is suspected brand issue"
    - "Seeking to build multifunctional brand team and process"
    - "Require systematic approach from strategy through implementation"
    - "Internal brand implementation is as important as external positioning"
    - "Want iterative, continuous improvement brand management system"
    - "Need to narrow gap between brand identity and reputation"
    - "Academic rigor required but practical application essential"

  starting_points:
    for_new_brands: "Start at Stage 1 (Brand Visioning) and progress sequentially"
    for_existing_brands: "Start at Stage 4 (Auditing Brandsphere) to assess current state, then address gaps"
    for_struggling_brands: "Start at Stage 2 (Organizational Culture Assessment) - often root cause"
    for_brand_refresh: "Start at Stage 5 (Brand Essence) but validate against Stages 1-4"

  implementation_advice:
    - "Form multifunctional team BEFORE beginning Stage 1"
    - "Budget adequate time for each stage (rush = gaps)"
    - "Use visual tools extensively (flowcharts, pyramids)"
    - "Document decisions at each stage for organizational learning"
    - "Establish evaluation cadence from the start (Stage 8 informs Stage 1)"
    - "Prioritize employee alignment as much as customer positioning"
    - "Don't skip stages even if tempting - each builds foundation for next"

