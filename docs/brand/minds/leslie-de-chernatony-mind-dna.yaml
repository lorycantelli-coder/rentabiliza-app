  - "Defining A 'Brand': Beyond The Literature With Experts' Interpretations - Journal of Marketing Management"
  - "A model for strategically building brands - Journal of Brand Management"
  - "Interactions between Organisational Cultures and Corporate Brands - Journal of Product and Brand Management"
  - "Consumer-Based Brand Equity Conceptualisation and Measurement (2010) - International Journal of Advertising"
  - "Modelling the components of the brand - Journal of Marketing Management"
